mlessly, completely fee-free.\r\n\r\nJoin us in this magical mystical ride.", "website": "https://fondeadora.com/", "status": "Active", "batch": "Winter 2020", "stage": "Growth", "team_size": 160, "subindustry": "Fintech -> Banking and Exchange", "urgency": 8, "market_size": 8, "pricing_potential": 5, "acquisition_cost": 6, "delivery_cost": 7, "uniqueness": 5, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 8, "evergreen_potential": 9, "total_score": 64, "replicability": 4, "niche_category": "Banking", "reasoning": "Fondeadora targets 54M+ underserved Mexicans with a digital banking alternative. Banking is a fundamental, evergreen need and Mexico's traditional banking system is widely criticized. With 160 employees, the company has achieved meaningful scale, and the neobank model enables strong upsell into lending, insurance, and investments."}, {"id": 21791, "name": "AtoB", "one_liner": "Modernizing global transportation payments.", "long_description": "The trucking and logistics industry provides the backbone of the economy, but the payments infrastructure on which it runs is broken; the existing suite of payment tools is outdated, difficult to use, prone to fraud, and saddled with hidden fee structures. \r\n\r\nAtoB is building Stripe for Transportation — modernizing the payments infrastructure for trucking and logistics, where capital movement occurs quickly and transparently. Our flagship product is the AtoB Fuel Card, a zero-fee fuel card accepted anywhere built for fleets of all shapes and sizes.", "website": "https://atob.com/", "status": "Active", "batch": "Summer 2020", "stage": "Growth", "team_size": 71, "subindustry": "Fintech", "urgency": 8, "market_size": 8, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 6, "uniqueness": 6, "speed_to_market": 3, "upfront_investment": 4, "upsell_potential": 8, "evergreen_potential": 9, "total_score": 64, "replicability": 3, "niche_category": "Payments", "reasoning": "AtoB modernizes transportation payments, replacing outdated and fraud-prone infrastructure in trucking and logistics. The industry is massive and payments are mission-critical. Deep domain expertise and integration requirements create moats, and there's strong expansion potential across the supply chain."}, {"id": 21829, "name": "Novel", "one_liner": "Novel is your international business bank account", "long_description": "With Novel, international founders can get a U.S. business bank account, multi-currency wallets, global transfers in 140+ currencies, and more all in a single place. \r\n", "website": "https://www.trynovel.com/", "status": "Active", "batch": "Summer 2020", "stage": "Early", "team_size": 15, "subindustry": "Fintech -> Banking and Exchange", "urgency": 8, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 5, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 8, "evergreen_potential": 9, "total_score": 64, "replicability": 4, "niche_category": "Banking", "reasoning": "Novel provides US business bank accounts and multi-currency wallets for international founders. This solves an urgent pain point for global entrepreneurs who struggle to access US banking. The cross-border banking need is growing with remote work trends, but regulatory complexity and banking partner relationships are barriers to entry."}, {"id": 22887, "name": "R2", "one_liner": "Embedded lending infrastructure", "long_description": "R2 enables platforms to seamlessly offer capital to their SMB customers in Latin America", "website": "https://r2.co/", "status": "Acquired", "batch": "Winter 2021", "stage": "Growth", "team_size": 75, "subindustry": "Fintech -> Credit and Lending", "urgency": 8, "market_size": 8, "pricing_potential": 7, "acquisition_cost": 6, "delivery_cost": 5, "uniqueness": 6, "speed_to_market": 4, "upfront_investment": 3, "upsell_potential": 8, "evergreen_potential": 9, "total_score": 64, "replicability": 3, "niche_category gent approach to understanding plan documents and orchestrating workflows is timely and differentiated."}, {"id": 26740, "name": "BlueHill Payments", "one_liner": "Expanding Payment Flexibility and Lowering Rates for Merchants", "long_description": "BlueHill is like a marketplace for payment processors. Our product is an intelligent gateway routing platform that automatically reduces transaction fees on everyday credit card transactions by routing transactions to different gateways based on a variety of parameters. This allows merchants to get access to a wider variety of alternative payment methods while lowering their fees, improving transaction clearance rate all while still getting lower processing rates. ", "website": "https://www.bluehillpayments.com/", "status": "Active", "batch": "Summer 2022", "stage": "Early", "team_size": 2, "subindustry": "Fintech -> Payments", "urgency": 7, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 8, "uniqueness": 6, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 6, "evergreen_potential": 8, "total_score": 64, "replicability": 5, "niche_category": "Payments", "reasoning": "BlueHill intelligently routes credit card transactions across payment processors to minimize fees, a clear value proposition for merchants. The savings are immediate and measurable, making the sale straightforward. The marketplace model for payment processors is differentiated but requires significant gateway integrations."}, {"id": 28886, "name": "Cardinal Gray", "one_liner": "Automating lenders' interactions with the DMV", "long_description": "When a lender gives out a car loan, they need to file a lien with their borrower’s DMV. This is difficult because the process varies by state and county. We’ve leveraged LLMs to help lenders automate lien filings for over $1B of loans.", "website": "https://www.cardinalgray.com/", "status": "Active", "batch": "Summer 2023", "stage": "Early", "team_size": 4, "subindus ies to pay for the out of pocket costs of any employee that enrolls in their spouse's health insurance plan. This saves customers $10k per enrollee while providing an incredible employee perk: 100% coverage of a family's health costs.\r\n\r\nWe’re now up to 50+ customers coast-to-coast with over 40k employees using our product!", "website": "https://www.healiahealth.com/", "status": "Active", "batch": "Winter 2024", "stage": "Early", "team_size": 15, "subindustry": "Fintech -> Insurance", "urgency": 7, "market_size": 7, "pricing_potential": 8, "acquisition_cost": 5, "delivery_cost": 6, "uniqueness": 8, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 64, "replicability": 4, "niche_category": "Insurance", "reasoning": "The dual-income family health insurance optimization is a novel and clever approach saving $10K per enrollee. This is highly differentiated since no one else specifically targets spousal plan arbitrage. The value prop is immediate and quantifiable, though it depends on employer adoption and the current insurance structure."}, {"id": 30363, "name": "BlindPay", "one_liner": "Stablecoin API for global payments", "long_description": "BlindPay is a stablecoin API that enables companies to send and receive money worldwide using fiat money, stablecoins and multiple blockchains. We handle all the complex compliance and regulatory requirements, so companies can focus on their core business.", "website": "https://blindpay.com/", "status": "Active", "batch": "Winter 2025", "stage": "Early", "team_size": 4, "subindustry": "Fintech -> Payments", "urgency": 7, "market_size": 9, "pricing_potential": 7, "acquisition_cost": 6, "delivery_cost": 7, "uniqueness": 4, "speed_to_market": 5, "upfront_investment": 4, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 64, "replicability": 5, "niche_category": "Payments", "reasoning": "BlindPay is another stablecoin API for global payments, directly competing with Infinite and others in this batch. The market is massive but differentiation is limited. Handling compliance and multi-blockchain support adds value but is replicable."}, {"id": 30427, "name": "Acolite", "one_liner": "AI Teammates for Insurance Agencies", "long_description": "Acolite builds AI teammates that handle submissions, issuing COIs, and SOV mapping across any AMS. Like an extra teammate, you simply forward an email and Acolite handles the rest.", "website": "https://acolite.ai", "status": "Active", "batch": "Spring 2025", "stage": "Early", "team_size": 3, "subindustry": "Fintech -> Insurance", "urgency": 7, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 5, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 7, "evergreen_potential": 9, "total_score": 64, "replicability": 5, "niche_category": "Insurance", "reasoning": "Acolite builds AI teammates for insurance agencies handling submissions, COIs, and SOV mapping. The workflow automation is practical and valuable but not unique in this crowded batch of insurance AI startups. Integration across AMS systems provides some moat."}, {"id": 30924, "name": "Casey", "one_liner": "Casey automates workflows for the insurance industry", "long_description": "Casey is the fastest way for commercial insurance brokers to submit complex risks. We automate client data collection, build risk profiles, and prepare carrier-ready submissions for wholesalers and underwriters in minutes.", "website": "https://www.meetcasey.ai/", "status": "Active", "batch": "Fall 2025", "stage": "Early", "team_size": 3, "subindustry": "Fintech -> Insurance", "urgency": 7, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 5, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 7, "evergreen_potential": 9, "total_score": 64, "replicability": 5, "niche_category": "Insurance", "reasoning": "Casey automates commercial insurance submissions for brokers, a specific and valuable workflow. The pain point is real but Casey is one of many insurance workflow AI tools in this batch. Focus on submission automation provides clear value but limited differentiation."}, {"id": 31083, "name": "Kita", "one_liner": "Turn documents into signals for lenders", "long_description": "In emerging markets like the Philippines, open finance is still nascent. Most of the population is traditionally unbanked, banking APIs don’t exist, and a borrower’s financial history lives in documents: e-wallet records, bank statements, utility bills, and more. Because this data is unstructured, credit and risk teams are forced into manual review. This slows decisioning, increases costs, and caps lending volume. Legacy OCR solutions break on noisy, real-world files and still require human verification.\r\n\r\nKita is the first document intelligence platform built specifically for lending. We are hyperlocalized around the signals that actually drive lending outcomes in emerging and undertapped domestic markets like the Philippines, Indonesia, Mexico, and beyond. Using a layered system led by vision-language models and computer vision, we outperform traditional OCR by transforming messy borrower documents into fraud-checked, decision-ready signals lenders can use directly in underwriting.\r\n\r\nUnder the hood, Kita is a learning system. We link document-level signals to repayment outcomes, allowing our models to continuously improve fraud detection and risk assessment over time. This creates a compounding advantage for lenders as their distinct underwriting decisions feed back into the system.\r\n\r\nWe’re Carmel and Rhea. We met before Stanford and have been building together ever since. Carmel is from Manila, is a repeat founder, and spent three years in product at Apple. Rhea has a research background in computer vision and received the highest honor in Stanford Computer Science. Together, we combine deep local context with strong technical execution to build the infrastructure that expands access to credit in emerging markets.", "website": "https://www.usekita.com/", "status": "Active", "batch": "Winter 2026", "stage": "Early", "team_size": 2, "subindustry": "Fintech", "urgency": 8, "market_size": 6, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 8, "uniqueness": 7, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 7, "evergreen_potential": 7, "total_score": 64, "replicability": 5, "niche_category": "Infrastructure/API", "reasoning": "Kita extracts financial signals from unstructured documents for emerging market lenders where banking APIs don't exist. The problem is urgent in markets like the Philippines with large unbanked populations. Geographically focused but addresses a genuine infrastructure gap."}, {"id": 120, "name": "Leaky", "one_liner": "Online auto and business insurance. (Acquired 2013)", "long_description": "Leaky is the best, free way to compare insurance.\r\n\r\nWith Leaky, we let you compare both prices and personalized quality scores for the largest insurers in the US. Insurance doesn't need to be scary, and so we do our best to help you through the process of comparing, shopping, and buying insurance.", "website": "http://leaky.com", "status": "Inactive", "batch": "Summer 2011", "stage": "Early", "team_size": 2, "subindustry": "Fintech -> Consumer Finance", "urgency": 7, "market_size": 8, "pricing_potential": 5, "acquisition_cost": 5, "delivery_cost": 8, "uniqueness": 4, "speed_to_market": 6, "upfront_investment": 6, "upsell_potential": 6, "evergreen_potential": 8, "total_score": 63, "replicability": 6, "niche_category": "Insurance", "reasoning": "Leaky was an insurance comparison platform, a lead-gen model in a huge market. Insurance comparison is a proven business model but highly competitive with many existing players. The evergreen nature of insurance demand is strong, but customer acquisition costs in insurance are no is is a persistent need but the service model requires scaling human reviewers alongside AI."}, {"id": 29307, "name": "Blume Benefits", "one_liner": "The AI copilot for health insurance brokers.", "long_description": "Blume is a web app that streamlines insurance quoting, renewal, and revenue ops processes for health insurance brokers. We are working with our first cohort of health insurance brokers to help them save the, on average, 6 hours of manual data entry they do every week.", "website": "https://www.blumebenefits.com/", "status": "Inactive", "batch": "Winter 2024", "stage": "Early", "team_size": 3, "subindustry": "Fintech -> Insurance", "urgency": 6, "market_size": 6, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 8, "uniqueness": 5, "speed_to_market": 6, "upfront_investment": 6, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 63, "replicability": 6, "niche_category": "Insurance", "reasoning": "Health insurance broker tools save meaningful time on data entry and quoting. The market of brokers is well-defined but not enormous. The company is inactive, suggesting product-market fit challenges. Health insurance brokerage will persist but the broker intermediary model may evolve."}, {"id": 29415, "name": "Givefront", "one_liner": "Nonprofit Financial Management", "long_description": "The world’s most important organizations deserve the world’s best financial infrastructure. We’re here to make sure they do.\r\n\r\nAt Givefront, we've built a modern financial management platform designed specifically for nonprofits. With real-time budgeting, built-in compliance, and easy integrations, we replace the spreadsheets and guesswork with smart, automated systems.\r\n\r\nBy transforming financial operations from reactive to real-time, Givefront empowers nonprofits to control every dollar, protect every grant, and move their missions forward faster — with greater efficiency, transparency, and trust.", "website": "https://givefront.com", "status": "Active", "batch": "Winter 2024", "stage": "Early", "team_size": 4, "subindustry": "Fintech -> Banking and Exchange", "urgency": 6, "market_size": 6, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 7, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 7, "evergreen_potential": 9, "total_score": 63, "replicability": 5, "niche_category": "Accounting/Tax", "reasoning": "Nonprofit financial management is an underserved niche with specific compliance and budgeting needs. The market is meaningful but nonprofits are price-sensitive. Built-in compliance and real-time budgeting specifically for nonprofits provides good differentiation from generic tools."}, {"id": 29448, "name": "xPay", "one_liner": "International Billing Ops, Sales Tax and Payments for SaaS businesses", "long_description": "We're building a commerce solution for SaaS companies globally that have overseas customers. We especially help them with streamlining billing operations like invoicing and reconciliation, managing foreign sales tax and accepting payments.  We abstract out the complexities of compliance, remittance and integration for these merchants by running all that machinery in the background. ", "website": "https://www.xpaycheckout.com/", "status": "Active", "batch": "Winter 2024", "stage": "Early", "team_size": 3, "subindustry": "Fintech -> Payments", "urgency": 7, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 5, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 63, "replicability": 5, "niche_category": "Payments", "reasoning": "International billing, sales tax, and payments for SaaS is a real pain point as companies expand globally. Competitors like Paddle, Stripe Tax, and Chargebee already address this space. The complexity of multi-jurisdiction tax compliance provides some moat but the market is getting crowded."}, {"id": 30020, "name": "Invo", "one_liner": "AI-Powered Collections Platform for Food Distributors", "long_description": "", "website": "https://www.tryinvo.com/", "status": "Active", "batch": "Winter 2025", "stage": "Early", "team_size": 2, "subindustry": "Fintech -> Credit and Lending", "urgency": 7, "market_size": 5, "pricing_potential": 7, "acquisition_cost": 6, "delivery_cost": 7, "uniqueness": 7, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 6, "evergreen_potential": 8, "total_score": 63, "replicability": 5, "niche_category": "Lending", "reasoning": "AI-powered collections for food distributors is a well-defined vertical with clear ROI. Food distribution has thin margins making collections critical. The niche focus provides differentiation, though the market is limited to the food distribution industry specifically."}, {"id": 30426, "name": "Ralo", "one_liner": "Find Your Best Mortgage Deal", "long_description": "Ralo is a mortgage platform built to deliver lower rates and lower fees by cutting out unnecessary intermediaries. We automate the complex work behind the scenes, from paperwork to pricing and negotiation.", "website": "https://www.ralo.com/", "status": "Active", "batch": "Spring 2025", "stage": "Early", "team_size": 2, "subindustry": "Fintech -> Consumer Finance", "urgency": 7, "market_size": 9, "pricing_potential": 5, "acquisition_cost": 6, "delivery_cost": 7, "uniqueness": 4, "speed_to_market": 5, "upfront_investment": 4, "upsell_potential": 6, "evergreen_potential": 10, "total_score": 63, "replicability": 4, "niche_category": "Lending", "reasoning": "Ralo is a mortgage comparison and automation platform competing on rates and fees. The mortgage market is enormous and evergreen. However, differentiation is limited with many mortgage comparison tools already available, and margins may be thin."}, {"id": 30591, "name": "Autonomous Technologies Group", "one_liner": "Superintelligent financial advisor", "long_description": "Autonomous is a superintelligent financial advisor at 0% advisory fees. \r\n\r\nToday, managing your money means one of two bad options:\r\n\r\nDIY your money: You end up with accounts everywhere (401k, IRAs, brokerage, crypto, savings, equity, secondaries). Your spreadsheet is always wrong. You make expensive mistakes because this isn't your full-time job.\r\n\r\nHire a financial advisor: They'll manage your money and charge 1-2% of assets annually. Run that math over multiple decades and you're handing over half your net worth to fees.\r\n\r\nNeither path can economically deliver the sophisticated, personalized strategies the ultra-wealthy use to compound wealth: strategic tax-loss harvesting across individual securities, systematic risk management, portfolio-backed borrowing to defer capital gains, access to alternatives, etc.\r\n\r\nThese aren't secret – they're just economically impossible to deliver at scale through traditional human advisors.\r\n\r\nRobos were supposed to fix this, but they were designed in a pre-AI world. In practice they just manage cookie-cutter portfolios. They don’t coordinate across your 401(k), taxable accounts, mortgage, equity, and cash flow, they don’t help with real decisions like job offers, windfalls, or concentrated stock, and they don’t deliver institutional strategies. That’s why, even after a decade plus, the biggest robos are still <$100B AUM while old-school advisors like Raymond James / Edward Jones sit on trillions.\r\n\r\nWe’re doing for financial advising what Robinhood did for brokerages. Think of it as a full-stack, AI-native wealth strategist that brings billionaire-style playbooks to ordinary investors.\r\n\r\nAutonomous is built around a frontier-scale reasoning engine—an AI that perceives global events as they unfold, understanding their deeper implications for markets and and most importantly, how these events will impact your investments. ", "website": "https://becomeautonomous.com/", "status": "Active", "batch": "Fall 2025", "stage": "Early", "team_size": 8, "subindustry": "Fintech", "urgency": 6, "market_size": 8, "pricing_potential": 5, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 5, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 8, "evergreen_potential": 9, "total_score": 63, "replicability": 5, "niche_category": "Wealth Management", "reasoning": "Autonomous offers an AI financial advisor at 0% fees, targeting the massive wealth management market. The free advisory model needs strong monetization elsewhere. Competition from robo-advisors like Wealthfront/Betterment is established, but AI could be a meaningful differentiator."}, {"id": 80, "name": "Debteye", "one_liner": "Automate credit counseling.", "long_description": "Automate credit counseling.", "website": "http://debteye.com", "status": "Acquired", "batch": "Summer 2011", "stage": "Early", "team_size": 2, "subindustry": "Fintech -> Consumer Finance", "urgency": 6, "market_size": 6, "pricing_potential": 5, "acquisition_cost": 5, "delivery_cost": 8, "uniqueness": 5, "speed_to_market": 7, "upfront_investment": 7, "upsell_potential": 6, "evergreen_potential": 7, "total_score": 62, "replicability": 7, "niche_category": "Consumer Finance", "reasoning": "Debteye automated credit counseling, addressing a real but not hair-on-fire consumer need. The software-based approach has low delivery costs and is relatively quick to build, but differentiation is limited. Consumer willingness to pay for credit counseling tools remains moderate."}, {"id": 439, "name": "Coinbase", "one_liner": "Buy, sell, and manage cryptocurrencies.", "long_description": "Founded in June of 2012, Coinbase is a digital currency wallet and platform where merchants and consumers can transact with new digital currencies like bitcoin, ethereum, and litecoin. Our vision is to bring more innovation, efficiency, and equality of opportunity to the world by building an open financial system. Our first step on that journey is making digital currency accessible and approachable for everyone. Two principles guide our efforts. First, be the most trusted company in our domain. Second, create user-focused products that are easier and more intuitive to use.", "website": "https://www.coinbase.com", "status": "Public", "batch": "Summer 2012", "stage": "Growth", "team_size": 6112, "subindustry": "Fintech -> Banking and Exchange", "urgency": 7, "market_size": 9, "pricing_potential": 7, "acquisition_cost": 6, "delivery_cost": 6, "uniqueness": 7, "speed_to_market": 3, "upfront_investment": 2, "upsell_potential": 8, "evergreen_potential": 7, "total_score": 62, "replicability": 2, "niche_category": "Crypto/Blockchain", "reasoning": "Coinbase is the leading US crypto exchange, publicly traded with massive brand recognition and regulatory compliance. The platform benefits from strong network effects and first-mover advantage in regulated crypto trading. Replication requires extensive regulatory licenses, but crypto's long-term market permanence carries more uncertainty than traditional finance."}, {"id": 523, "name": "Standard Treasury", "one_liner": "Banking APIs; acquired by Silicon Valley Bank in August 2015", "long_description": "Standard Treasury helped banks harness the power of developers and developer ecosystems by building, hosting, maintaining, and supporting white-labeled and co-branded developer platforms for banks worldwide. Standard Treasury partner banks saw material top-line growth through the decreased cost of servicing their customers, decreased churn, and increased transaction volumes, while delivering tremendous value to their customers by allowing them to radically automate their treasury management and accounting processes.", "website": "http://standardtreasury.com", "status": "Acquired", "batch": "Summer 2013", "stage": "Early", "team_size": 0, "subindustry": "Fintech -> Banking and Exchange", "urgency": 7, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 4, "delivery_cost": 7, "uniqueness": 7, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 62, "replicability": 3, "niche_category": "Infrastructure/API", "reasoning": "Standard Treasury built white-labeled banking APIs for banks, addressing the critical need for banks to modernize through developer platforms. Acquired by Silicon Valley Bank, validating the approach. Deep banking integration expertise and compliance requirements make this difficult to replicate, though the market has since grown with players like Plaid and MX."}, {"id": 668, "name": "Owners Circle", "one_liner": "Kickstarter for local businesses", "long_description": "OwnersCircle provides small business owners with the online tools and financial information that they need in order to navigate the complex world of business financing.\r\n\r\nThe reality is that there is no easy way to search for small business financial products, which creates a headache for already time-strapped business owners. Recent reports show that owners spend an enormous amount of time (25 hrs on average) searching and applying for loan products, with many focusing on lenders that have high rejection rates and long, complex processes.\r\n\r\nThere's a better way! There are a growing number of banks and alternative lenders that want to work with small businesses and are willing to compete for their business. Our platform provides owners with the information they need in order to identify, compare, and apply for financial products that can help take their business to the next level.\r\n\r\n\r\nWhy Use OwnersCircle?\r\n\r\n1. Get access to free, online tools to identify financial institutions that actively lend to growing small businesses\r\n2. Shop and compare a variety of lenders and their loan products \r\n3. Use one platform to complete your financing search versus spending countless days researching and completing lender applications only to find out you're not a fit\r\n4. Free access to our team of r insurance partner economics."}, {"id": 1482, "name": "Sandbox Banking", "one_liner": "Low-code integration platform for banking", "long_description": "Sandbox Banking provides a low-code platform to quickly build and run banking integrations.  Our software is literally a web application named Glyue, and it's typically used by banks, credit unions, and fintechs to connect banking systems.  Glyue integrations are often web service APIs, batch ETL jobs, file/document transfer jobs, or event-driven pub/sub services (e.g. web hooks, Kafka streaming data pipelines).", "website": "https://sandboxbanking.com", "status": "Acquired", "batch": "Winter 2017", "stage": "Early", "team_size": 33, "subindustry": "Fintech -> Banking and Exchange", "urgency": 7, "market_size": 6, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 6, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 7, "evergreen_potential": 9, "total_score": 62, "replicability": 4, "niche_category": "Infrastructure/API", "reasoning": "Sandbox Banking provides a low-code integration platform for banking systems, addressing a real pain point as banks modernize. The Glyue platform enables faster integrations between legacy banking systems and modern fintechs. Acquired, validating the need, though competition from MuleSoft and other integration platforms exists."}, {"id": 1503, "name": "Aella", "one_liner": "Diversified credit infrastructure powering payments across Africa.", "long_description": "Aella is a diversified credit payments platform with over 2 million users, offering a raft of financial services to underbanked users across Africa with a focus on lending. We are at the forefront of financial inclusion and empowerment of the underbanked. \r\n\r\nAella’s Debt-as-a-service model ensures that agents across Africa are able to have quick and easy access to funding through its partnerships with leading agency banks across the continent.", "website": "http://www.aellaap  and total rewards."}, {"id": 4940, "name": "Wave", "one_liner": "Mobile money app for Africa", "long_description": "Building extremely affordable financial infrastructure for Africa.", "website": "https://wave.com", "status": "Active", "batch": "Winter 2012", "stage": "Early", "team_size": 1600, "subindustry": "Fintech -> Payments", "urgency": 9, "market_size": 9, "pricing_potential": 5, "acquisition_cost": 6, "delivery_cost": 6, "uniqueness": 6, "speed_to_market": 2, "upfront_investment": 2, "upsell_potential": 8, "evergreen_potential": 9, "total_score": 62, "replicability": 2, "niche_category": "Payments", "reasoning": "Wave builds mobile money infrastructure for Africa with 1600 employees, indicating massive scale. Extremely urgent need as most Africans lack access to traditional banking. Requires significant capital, regulatory licenses, and agent networks, making replication nearly impossible for small teams."}, {"id": 12008, "name": "Swadesh", "one_liner": "We setup Immigrants with a free US Bank Account, Credit Card, SIM…", "long_description": "We offer a free US FDIC Insured Checking account, Free Credit Card (no interest rate, collateral, fees), Free AT&T SIM Card shipped to home with 40%+ cheaper plans than retail, and save thousands of dollars in remittances to our customers - all by opening a free Swadesh Account. \r\n\r\nWe enable new to America expats become \"American\" in the eyes of the US Financial system. \r\nWe're starting by serving the 150,000+ Indian expats migrating to the US each year. \r\n\r\nWe have a comprehensive solution that covers banking, credit building, communication, remittance, as well as value-add services such as insurance, housing etc. along with all the standard bells and whistles of neobanks. ", "website": "http://www.swadesh.co", "status": "Active", "batch": "Summer 2019", "stage": "Early", "team_size": 10, "subindustry": "Fintech -> Consumer Finance", "urgency": 8, "market_size": 6, "pricing_potential": 5, "acquisition_cost": 7, "delivery_cost": 6, "uniqueness": 7, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 62, "replicability": 4, "niche_category": "Consumer Finance", "reasoning": "Swadesh bundles banking, credit card, SIM card, and remittances for US immigrants, addressing an urgent and real pain point for a well-defined audience. Strong acquisition through immigrant communities but market is limited to new immigrants. Good upsell potential across financial products."}, {"id": 13149, "name": "Haven", "one_liner": "Homeownership reimagined for the 21st century.", "long_description": "Haven is re-imagining the $11 trillion U.S. mortgage industry, with a focus on engaging the 53 million homeowners with a mortgage. The incumbent technologies used by mortgage lenders and servicers are decades old, and the borrowers who are served by them increasingly demand modern digital experiences and frictionless financial products throughout the home journey. Haven’s mission is to deliver them at a transformational scale, and to improve lives in one of the world’s largest asset classes.\r\n\r\nThe company is well capitalized and backed by top fintech and mortgage venture funds and led by seasoned veterans of tech startups and financial marketplaces. \r\n", "website": "http://www.havenservicing.com", "status": "Active", "batch": "Winter 2020", "stage": "Early", "team_size": 15, "subindustry": "Fintech -> Credit and Lending", "urgency": 6, "market_size": 9, "pricing_potential": 7, "acquisition_cost": 4, "delivery_cost": 7, "uniqueness": 5, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 7, "evergreen_potential": 9, "total_score": 62, "replicability": 4, "niche_category": "Lending", "reasoning": "Haven targets the $11T US mortgage servicing industry with modern digital experiences. The market is enormous and evergreen but selling to incumbent lenders and servicers is slow. Technology modernization in mortgage servicing is inevitable but requires deep domain expertise and long sales cycles."}, {"id": 13475, "name": "delt.ai", "one_liner": "Digital banking for businesses in Latam.", "long_description": "delt.ai is building a specialized digital financial service for businesses in Latam, set to tackle the +450B Market of business payments in Mexico. delt.ai is a natively digital alternative to a bank, born with payments gateways and API integrations. Its truly digital KYC-compliant onboarding allowed us to be the first opening first branchless accounts in the country. We target poorly served Startups and SMEs therefore focusing on the ~40B market opportunity that are profitable when served fully online.", "website": "https://delt.ai", "status": "Acquired", "batch": "Winter 2020", "stage": "Early", "team_size": 26, "subindustry": "Fintech -> Banking and Exchange", "urgency": 8, "market_size": 8, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 6, "uniqueness": 5, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 8, "evergreen_potential": 8, "total_score": 62, "replicability": 4, "niche_category": "Banking", "reasoning": "Digital banking for LatAm businesses targets a $450B+ payments market in Mexico where traditional banking is inadequate. The natively digital KYC and API integrations are competitive advantages. Acquired status validates the approach, and business banking has strong upsell into lending, FX, and payroll."}, {"id": 19888, "name": "Altro", "one_liner": "Build Credit With Your Subscriptions", "long_description": "Altro (altro.io) is a platform that enables members to build credit no matter who they are, where they are from, or their history of credit access/score. We serve the 68M people in the US (mainly Women and POC) who are denied credit due to historical bias and the lack of access that current banks provide to credit building and tools. (It wasn't until The Equal Credit Opportunity Act in the 1970's that Women and \"Minorities\" could even get fair access to credit)!\r\n\r\n\r\nAltro has created a mobile that allows anyone to have access to credit, using their subscriptions as a means to start building their credit score. Altro lends to members a $75 Line of Credit to pay for their subscriptions, such as Netflix, Hulu, HelloFresh, etc. This card is built to solely work on the subscriptions that the member is already paying for, allowing them to securely use their $75 credit to build their credit using things they are already paying for.\r\n\r\nDoing this empowers folx who were denied credit a way to start building their score and financial power. Altro will service millions of people in not only building their credit, but also gaining access to the tools (such as personal loans, emergency funds, car/house loans and more) that they could not access prior.", "website": "https://altro.io", "status": "Acquired", "batch": "Summer 2020", "stage": "Growth", "team_size": 29, "subindustry": "Fintech -> Consumer Finance", "urgency": 7, "market_size": 7, "pricing_potential": 5, "acquisition_cost": 6, "delivery_cost": 7, "uniqueness": 5, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 62, "replicability": 5, "niche_category": "Consumer Finance", "reasoning": "Altro lets users build credit through existing subscriptions, targeting 68M credit-invisible Americans. The concept is compelling for underserved consumers but faces competition from similar credit-building tools. Good viral potential through word-of-mouth but limited pricing power given the target demographic."}, {"id": 21817, "name": "Volopay", "one_liner": "Brex for South East Asia - Corporate cards & automated payments.", "long_description": "Volopay is a modern spend management platform that saves companies time and money by giving visibility & control to every aspect of business spending. With Volopay, finance and accounting teams can control expense requests and approvals, make bill payments (domestic/cross-border), manage company cards, and reconcile all accounting on one platform.\r\n\r\nVolopay completely eliminates the need for expense reports and reimbursements while giving everyone in the company a card to use. We worked in an offshore dev centre in the past and it took 2 months to get our reimbursements and 4 weeks to make any purchase as there was just one corporate card for the entire company and clunky bill payments solutions offered by the banks. \r\n\r\nAmong our customers are Reddoorz (OYO of South East Asia), Dathena (biggest data security co in Singapore) and Beam (APAC’s leading micro-mobility player). ", "website": "https://www.volopay.com/", "status": "Active", "batch": "Summer 2020", "stage": "Early", "team_size": 11, "subindustry": "Fintech -> Payments", "urgency": 7, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 4, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 8, "evergreen_potential": 9, "total_score": 62, "replicability": 4, "niche_category": "Payments", "reasoning": "Volopay is Brex for Southeast Asia, offering corporate cards and automated payments. The SEA market for corporate spend management is growing rapidly with enterprises needing better visibility. The model is proven in the US but faces competition from both local and international players expanding into the region."}, {"id": 22148, "name": "Spenmo", "one_liner": "A spend management software that provides businesses visibility,…", "long_description": "Founded in June 2019 and based in Singapore, Spenmo is building the only software you need as a business to manage payables. From bill payment, corporate card, local and international transfer, to employee’s expense claim, Spenmo helps companies streamline their AP processes with our technology. \r\n\r\nBefore Spenmo, AP staff were drowned in manual work and struggled to reconcile all their spending on time. Not anymore. Thousands of businesses are now using Spenmo to payout their AP, track and categorize spend, and close their books on auto-pilot in 90% less time. On average, finance teams who use Spenmo save over 50 hours and $10,000 every month.", "website": "https://summitglobal.com/", "status": "Active", "batch": "Summer 2020", "stage": "Growth", "team_size": 200, "subindustry": "Fintech -> Banking and Exchange", "urgency": 7, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 4, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 8, "evergreen_potential": 9, "total_score": 62, "replicability": 4, "niche_category": "Payments", "reasoning": "Spenmo is a spend management platform for businesses in Singapore and SEA, handling bill payments, corporate cards, and expense claims. The AP automation space is growing rapidly as companies digitize finance operations. Strong upsell potential but faces competition from global players like Brex and local alternatives."}, {"id": 22152, "name": "Afriex", "one_liner": "Instant, low-fee remittances", "long_description": "Afriex makes it easy for immigrants to send money home.  We offer instant, low-fee remittances to over 25 countries around the world.", "website": "https://www.afriexapp.com", "status": "Active", "batch": "Summer 2020", "stage": "Growth", "team_size": 55, "subindustry": "Fintech -> Payments", "urgency": 9, "market_size": 8, "pricing_potential": 5, "acquisition_cost": 6, "delivery_cost": 6, "uniqueness": 4, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 7, "evergreen_potential": 9, "total_score": 62, "replicability": 4, "niche_category": "Payments", "reasoning": "Afriex provides instant, low-fee remittances to 25+ countries, serving the immigrant diaspora. Remittances are a critical, urgent need for millions of families. The market is massive globally but competitive with players like Wise, Remitly, and WorldRemit. Margins are thin due to fee competition but volume potential is enormous."}, {"id": 22174, "name": "Lendtable", "one_liner": "We give employees cash advances for their 401k match and ESPP", "long_description": "1 in 4 Americans do not get their full 401(k) match. That means 25 million workers are leaving $24 billion on the table in free employer contributions. The primary reason these workers cannot get their match is because they do not have enough to both cover living expenses and invest. \r\n\r\nLendtable helps workers get thousands in additional income by giving them a cash advance to cover their living expenses so they can finally begin earning their employer match. Once their money has vested we take some of the match money earned in order to cover our expenses. \r\n\r\nWorkers now have thousands of dollars more without putting any money down, and we make money helping them do so -- we win if they win.", "website": "http://lendtable.com", "status": "Active", "batch": "Summer 2020", "stage": "Growth", "team_size": 20, "subindustry": "Fintech -> Credit and Lending", "urgency": 6, "market_size": 7, "pricing_potential": 6, "acquisition_cost": 6, "delivery_cost": 7, "uniqueness": 7, "speed_to_market": 5, "upfront_investment": 4, "upsell_potential": 6, "evergreen_potential": 8, "total_score": 62, "replicability": 5, "niche_category": "Lending", "reasoning": "Lendtable gives cash advances so employees can capture their full 401k match and ESPP benefits. Clever concept addressing $24B left on the table annually. Relatively unique positioning but requires capital to fund advances, and the value proposition depends on employees staying at their jobs long enough to vest."}, {"id": 22844, "name": "Kodo", "one_liner": "Corporate card & spend management platform for Indian startups", "long_description": "", "website": "https://www.kodo.com", "status": "Active", "batch": "Winter 2021", "stage": "Early", "team_size": 45, "subindustry": "Fintech -> Payments", "urgency": 7, "market_size": 8, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 4, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 8, "evergreen_potential": 9, "total_score": 62, "replicability": 4, "niche_category": "Payments", "reasoning": "Kodo offers corporate cards and spend management for Indian startups, similar to Brex/Ramp for India. The Indian startup ecosystem is growing rapidly creating strong demand. However, the space is becoming competitive with multiple players, and the model requires banking partnerships and credit risk management."}, {"id": 22853, "name": "Udhaar App", "one_liner": "We're Khatabook / OkCredit for Pakistan", "long_description": "We are a simple book-keeping app, to help 30M micro SMEs run their finances digitally.\r\n\r\nI was visiting Pakistan. 1-day, asked our local store owner on plans for his next location. His response, 'never'. \r\n\r\nSince business operations & money flow are manual, he worked 16 hours / 7 days to minimize theft. Zero time with family. We got obsessed with identifying how we can help small business owners run their business and have a life. \r\n\r\nEverything in Pakistan is manual, store credit, sales, purchasing inventory, cash management, tax filings, payments, etc.\r\n\r\nThis idea got us hooked as it allows us to build a large company and have a huge impact on ~30M small businesses in Pakistan that contribute 74% of the overall GDP.\r\n\r\nExplosion in 4G adoption (91M 4G subscribers, 720% growth in 5 years), is helping drive product market fit:\r\ni. >1M downloads\r\nii. 4.6 star rating on Playstore & Appstore\r\niii. MAUs & GTV: get in touch :)", "website": "https://udhaar.pk/", "status": "Active", "batch": "Winter 2021", "stage": "Early", "team_size": 32, "subindustry": "Fintech -> Payments", "urgency": 7, "market_size": 7, "pricing_potential": 4, "acquisition_cost": 7, "delivery_cost": 7, "uniqueness": 4, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 8, "evergreen_potential": 8, "total_score": 62, "replicability": 5, "niche_category": "Accounting/Tax", "reasoning": "Udhaar App is a digital bookkeeping app for 30M micro-SMEs in Pakistan, similar to Khatabook/OkCredit. The market is large and mostly analog, creating strong adoption potential. Low pricing per user but massive volume, with upsell into payments, lending, and other financial services as the platform grows."}, {"id": 22857, "name": "Kredi", "one_liner": "Rocket Mortgage for LatAm. ", "long_description": "Kredi is rocket mortgage for LatAm. ", "website": "https://www.kredi.mx/", "status": "Active", "batch": "Winter 2021", "stage": "Early", "team_size": 66, "subindustry": "Fintech -> Credit and Lending", "urgency": 8, "market_size": 9, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 5, "uniqueness": 5, "speed_to_market": 3, "upfront_investment": 3, "upsell_potential": 8, "evergreen_potential": 9, "total_score": 62, "replicability": 3, "niche_category": "Lending", "reasoning": "Kredi is Rocket Mortgage for LatAm, digitizing the mortgage process in a region where homebuying is complex and manual. The mortgage market in LatAm is enormous and underdigitized. High urgency for homebuyers but requires significant capital, regulatory compliance across countries, and deep integration with local banking systems."}, {"id": 23064, "name": "Tint", "one_liner": "Makes it easy for tech platforms to embed insurance into products", "long_description": "Tint makes it easy for tech platforms to embed insurance into their products. For example, when you go to Outdoorsy to rent an RV, the insurance that is sold with the rental is powered by our technology.\r\n\r\nOur product provides anything that is needed from underwriting software to access to insurers to compliance, in a simple API. ", "website": "http://www.tint.ai", "status": "Active", "batch": "Winter 2021", "stage": "Early", "team_size": 40, "subindustry": "Fintech -> Insurance", "urgency": 6, "market_size": 8, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 6, "uniqueness": 7, "speed_to_market": 3, "upfront_investment": 3, "upsell_potential": 8, "evergreen_potential": 9, "total_score": 62, "replicability": 3, "niche_category": "Embedded Finance", "reasoning": "Tint enables tech platforms to embed insurance into their products with underwriting software and insurer access. Embedded insurance is a growing market with strong platform economics. Insurance requires significant regulatory and carrier relationships, making it hard to replicate."}, {"id": 23120, "name": "Slash", "one_liner": "Business banking that understands your industry's unique challenges", "long_description": "Backed by Y Combinator, NEA, and Stanford University, Slash is one of the fastest growing fintech companies in America.\r\n\r\nAt Slash, we're building a new category of business banking that recognizes the fundamental differences between industries. We combine the reliability of traditional banking (high yields, competitive rewards, and comprehensive security) with industry-specific features that make businesses more efficient, more competitive, and more profitable.\r\n\r\nBy deeply studying workflows across verticals, we reimagine what banking can be when it's designed with true industry insight.\r\n\r\nWe offer businesses:\r\n1. Deposit accounts with free outgoing wire and ACH transfers. \r\n2. Corporate cards with up to 2% cash back, virtual cards, fine grain spend controls, and controls/automation to save hours of work.\r\n3. Integrations to all major accounting platforms.\r\n4. Detailed spend, income, and other financial analytics.\r\n5. Vertical specific software that automate's your industry's unique, pressing challenges", "website": "https://www.slash.com/", "status": "Active", "batch": "Summer 2021", "stage": "Growth", "team_size": 35, "subindustry": "Fintech", "urgency": 7, "market_size": 8, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 6, "uniqueness": 6, "speed_to_market": 4, "upfront_investment": 3, "upsell_potential": 8, "evergreen_potential": 9, "total_score": 62, "replicability": 3, "niche_category": "Banking", "reasoning": "Slash offers industry-specific business banking, recognizing that different industries have different financial needs. Business banking is a massive market with strong upsell potential. Requires banking partnerships and significant capital, but the industry-vertical approach is differentiated."}, {"id": 23885, "name": "marketfeed", "one_liner": "Helps affluent Indians invest in automated options trading strategies ", "long_description": "marketfeed offers an automated trading platform that helps users earn returns through sophisticated options trading strategies. By connecting their broker's account, users can automate expert-developed strategies. The platform automatically executes trades, providing the potential for periodic earnings without the need for constant monitoring.", "website": "https://marketfeed.com", "status": "Active", "batch": "Summer 2021", "stage": "Early", "team_size": 55, "subindustry": "Fintech -> Consumer Finance", "urgency": 6, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 6, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 7, "evergreen_potential": 7, "total_score": 62, "replicability": 5, "niche_category": "Wealth Management", "reasoning": "Marketfeed offers automated options trading strategies for Indian investors. India's retail trading market is booming with 100M+ demat accounts. Automated trading commands premium pricing from users seeking returns. Regulatory risk and performance variability are concerns."}, {"id": 23969, "name": "Baraka", "one_liner": "Grow Your Wealth With Baraka", "long_description": "💸Hey YC, we’re baraka (S21), an investment app built for people in the Middle East.\r\n\r\n📱 Our product\r\n\r\nThis is how we do it:\r\n•\t6,000+ stocks and ETFs – the freedom to choose the companies and industries that you want to back\r\n•\tThe power of financial literacy – educational  content, digestible market news and in-depth stock analysis\r\n•\tFractional Shares – the ability to start investing with smaller sums of money\r\n•\tFair pricing – Transparent, low commission pricing model\r\n•\tEasy to use – intuitive user journey and interface  \r\n\r\n\r\n🕒 What's Next?\r\n\r\nThe app is available in countries across MENA. Check out our website: getbaraka.com.\r\n\r\nPlease reach out to give us feedback, discuss product, go-to-market strategy or anything else on founders@getbaraka.com.  \r\n\r\nFeras & Kunal\r\n", "website": "https://www.getbaraka.com/", "status": "Active", "batch": "Summer 2021", "stage": "Growth", "team_size": 34, "subindustry": "Fintech -> Asset Management", "urgency": 6, "market_size": 7, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 5, "speed_to_market": 5, "upfront_investment": 4, "upsell_potential": 8, "evergreen_potential": 9, "total_score": 62, "replicability": 4, "niche_category": "Wealth Management", "reasoning": "Baraka is an investment app for the Middle East offering 6000+ stocks and ETFs with financial literacy content. Growing wealth in the MENA region creates demand. Strong upsell into premium tiers, advisory services, and new asset classes. Competes with eToro and local brokers."}, {"id": 23988, "name": "DolarApp", "one_liner": "The Financial App for affluent consumers in Latin America.", "long_description": "DolarApp provides access to U.S. Financial Services to affluent consumers in Latin America: local and international transfers, transparent exchange rates, savings in digital dollars, investment in US stocks & ETFs, and international payments with a credit card – without hidden fees.\r\n\r\nDolarApp was started by Alvaro, Zach and Fernando, who worked together at Revolut. They are all engineers by background, and they all started their careers in consulting.", "website": "https://www.dolarapp.com/", "statu cts in one place, then guides them through life transitions as circumstances and priorities evolve. Like getting married, moving, having a baby, or losing a parent.\r\nUnlike traditional wealth management tools or online estate platforms that produce static legal documents, Elayne is dynamic, intelligent, and built not just to delight, but to comfort and guide you when it matters most.\r\n\r\nI started Elayne after my mom passed away and I had to settle her estate, accounts, and affairs - essentially, I suddenly had to untangle all the details of her life. It was shocking how fragmented and opaque the process was and how I spent hundreds of hours chasing documents, coordinating accounts, filling legal gaps, and navigating unfamiliar systems, all while grieving and working full time. It shouldn’t be that way.\r\n\r\nIn the future, you could hire an attorney, download DIY legal forms, fax and mail physical documents, sync 10 different fintech apps, use a financial planner, spend thousands in fees, and hope it all holds together. Or, you could just use Elayne.", "website": "https://www.elayne.com/", "status": "Active", "batch": "Summer 2024", "stage": "Early", "team_size": 6, "subindustry": "Fintech", "urgency": 5, "market_size": 7, "pricing_potential": 6, "acquisition_cost": 4, "delivery_cost": 7, "uniqueness": 7, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 7, "evergreen_potential": 9, "total_score": 62, "replicability": 5, "niche_category": "Wealth Management", "reasoning": "Estate planning and family asset organization is a permanent need but not typically urgent until life events occur. The AI copilot for life transitions is differentiated from traditional estate planning tools. B2B and B2C dual approach provides flexibility but the sales cycle for wealth-adjacent products can be long."}, {"id": 30614, "name": "Astor", "one_liner": "AI advisor for retail investors", "long_description": "Astor is an AI investment advisor for retail investors.\ ment": 3, "upsell_potential": 6, "evergreen_potential": 9, "total_score": 61, "replicability": 3, "niche_category": "Payments", "reasoning": "Sendwave addressed the critical need for affordable remittances, a market driven by diaspora communities sending money home. Building money transfer corridors requires regulatory licenses and banking partnerships in each country, making replication difficult. The evergreen nature of migration-driven remittances ensures long-term demand."}, {"id": 100, "name": "MarketBrief", "one_liner": "Generate stories from SEC filings.", "long_description": "MarketBrief analyzes 30,000+ trusted documents per day looking for relevant business headlines and breaking news all within fractions of a second.", "website": "http://marketbrief.com", "status": "Inactive", "batch": "Summer 2011", "stage": "Early", "team_size": 2, "subindustry": "Fintech -> Consumer Finance", "urgency": 5, "market_size": 5, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 8, "uniqueness": 6, "speed_to_market": 7, "upfront_investment": 7, "upsell_potential": 5, "evergreen_potential": 7, "total_score": 61, "replicability": 7, "niche_category": "Other", "reasoning": "MarketBrief generated stories from SEC filings using automated analysis, a niche financial data product. While the technology is replicable with modern NLP, the real-time analysis of 30K+ documents daily provided some differentiation. The market for financial intelligence is persistent but the specific product struggled to find scale."}, {"id": 161, "name": "Balanced", "one_liner": "Payments for Marketplaces", "long_description": "Payments for Marketplaces.\n\nWe're obsessed with all forms of infrastructure, including communications, transportation, energy, waste management, and payments. Robust infrastructure creates a happier, more productive, and more prosperous society. You know exactly what I mean if you've traveled somewhere where you struggled to find a reliable Internet connect or even nt is smart. Acquired, validating the model, though the marketplace approach faces competition from banks expanding digital channels."}, {"id": 1670, "name": "LotusPay", "one_liner": "Recurring payments solution for businesses in India.", "long_description": "LotusPay was acquired by Juspay in Jan 2024.\r\n\r\nLotusPay is the recurring payments solution for businesses in India. We enable our clients to quickly and easily collect payments directly from their user's bank accounts via paperless NACH Debit.\r\n\r\nLotusPay is perfect for collecting loan repayments, membership fees, subscription and billing, recurring donations, tuition fees - any kind of regular or irregular payment, be it a fixed amount or variable amount.\r\n\r\nLotusPay is backed by Y Combinator.", "website": "http://www.lotuspay.com", "status": "Acquired", "batch": "Summer 2017", "stage": "Early", "team_size": 5, "subindustry": "Fintech -> Payments", "urgency": 7, "market_size": 7, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 5, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 6, "evergreen_potential": 8, "total_score": 61, "replicability": 5, "niche_category": "Payments", "reasoning": "LotusPay provided recurring payment solutions in India via NACH Debit, addressing a clear need for businesses collecting loan repayments and subscriptions. Acquired by Juspay, validating the product-market fit. The India-specific payment infrastructure focus is valuable but faces competition from other payment processors."}, {"id": 1810, "name": "Treasury Prime", "one_liner": "Embedded banking software platform and marketplace", "long_description": "Founded in 2017, Treasury Prime is an embedded banking software platform connecting enterprise companies to a vast marketplace of banks and product partners to launch next-gen payment ecosystems on their platform.  Our banking API offers the quickest, most secure way for fintechs and banks to partner, integrate and build modern financial products and increase revenue streams.\r\n\r\nWe power enterprise-class embedded banking solutions for a range of complex services including money transfer, risk mitigation and integration with bank infrastructure. It's these leading-edge capabilities that helped the company to win Best Banking-as-a-Service Platform from Tearsheet in 2021 and 2022. The company was also named to CB Insights’ annual 2021 Fintech 250 list.\r\n", "website": "https://treasuryprime.com", "status": "Active", "batch": "Winter 2018", "stage": "Growth", "team_size": 100, "subindustry": "Fintech -> Banking and Exchange", "urgency": 7, "market_size": 8, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 6, "speed_to_market": 3, "upfront_investment": 2, "upsell_potential": 8, "evergreen_potential": 8, "total_score": 61, "replicability": 2, "niche_category": "Embedded Finance", "reasoning": "Treasury Prime provides BaaS infrastructure connecting fintechs to banks, a critical enabler for embedded finance. Requires deep banking relationships and regulatory expertise, making it very hard to replicate. Strong upsell through expanding API usage and bank network."}, {"id": 1832, "name": "Tilt (f.k.a. Delphia)", "one_liner": "Tilt lets anyone build an index out of any content on the web.", "long_description": "Tilt lets anyone build evidence-backed, point-in-time, and deterministic rules-based investment strategies... in minutes. All you need is a prompt — whether a theme, trend, or detailed thesis — we'll take care of the rest. Advisors also use Tilt to customize their client portfolios with tax considerations and investment preferences. \r\n\r\nIf you're thinking about working here, we're on a mission to price the world's information.", "website": "http://tilt.io", "status": "Active", "batch": "Winter 2018", "stage": "Growth", "team_size": 25, "subindustry": "Fintech -> Consumer Finance", "urgency": 5, "market_size": 7, "pricing_potential": 7, "acquisi 7, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 4, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 8, "evergreen_potential": 8, "total_score": 61, "replicability": 3, "niche_category": "Embedded Finance", "reasoning": "Banking-as-a-Service APIs for LatAm enables any company to embed financial products. Now inactive, but the concept addresses real infrastructure gaps in the region. Competitive with Rapyd, Stripe, and regional players. Regulatory complexity in LatAm is a barrier."}, {"id": 25613, "name": "Gauss", "one_liner": "Lower interest rates on existing credit cards", "long_description": "Gauss allows people with good credit scores to significantly lower interest rates on their credit cards while they keep using them. \r\n\r\nUsers connect their credit cards to the mobile app and get a revolving credit line in under 10 minutes. Gauss tracks and automatically pays off any expensive balance on connected cards, saving users thousands of dollars on interest charges and helping them pay off card balances faster and improve credit scores.", "website": "https://gauss.money", "status": "Active", "batch": "Winter 2022", "stage": "Early", "team_size": 16, "subindustry": "Fintech -> Consumer Finance", "urgency": 7, "market_size": 7, "pricing_potential": 6, "acquisition_cost": 6, "delivery_cost": 6, "uniqueness": 7, "speed_to_market": 4, "upfront_investment": 3, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 61, "replicability": 3, "niche_category": "Consumer Finance", "reasoning": "Lowering credit card interest rates by providing a cheaper revolving credit line is a compelling value proposition with clear ROI for consumers. Requires significant capital to fund credit lines. Differentiated approach compared to balance transfer cards and debt consolidation loans."}, {"id": 25660, "name": "PayCaddy", "one_liner": "Simplified Banking as a Service for Latam", "long_description": "PayCaddy enables Latam companies to launch financial products with an API based platform. Rather than building fintech from scratch, or dealing with a legacy bank, companies can use PayCaddy to open digital wallets with KYC checks, automate online payments, and issue personalized debit and prepaid cards for customers or employees. ", "website": "https://paycaddy.com/", "status": "Active", "batch": "Winter 2022", "stage": "Early", "team_size": 20, "subindustry": "Fintech", "urgency": 7, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 4, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 8, "evergreen_potential": 8, "total_score": 61, "replicability": 3, "niche_category": "Embedded Finance", "reasoning": "Banking-as-a-Service for LatAm with digital wallets, KYC, and card issuance via API. Similar to Valari but with a 20-person team suggesting more traction. The BaaS model has strong expansion revenue as clients grow their user bases. Regulatory requirements in each LatAm country are a barrier."}, {"id": 25665, "name": "Wibond", "one_liner": "Affirm for LATAM ", "long_description": "Under \"Buy Now, Pay Later\" business model, Wibond is a 100% flexible digital payment method enabling the 200 million underbanked consumers without credit cards to shop online for the first time. \r\n\r\nWe integrate directly into the purchase flow of online merchants, and we offer consumers a credit, when they have already made up their mind that they want to acquire a specific product.\r\nWe provide financial and digital access to a large community of people offering payment options according to their possibilities and profile. Wibond is an inclusive and simple solution:\r\n - Consumers can create their free account to quickly access and pay without banks, in installments, and without a card.\r\n - Merchants with e-commerce channels increase their sales and integrate Wibond in a very agile way by offering a new form of payment and expanding their markets.\r\n\r\nWe’re also integrated in the purchase flow of more than 500 merchants, including Samsung, Musimundo (one of the Biggest retailers in LATAM) , and Motorola. And up to 65% of the payment transactions on these sites go through us.  \r\n", "website": "https://www.wibond.co/", "status": "Active", "batch": "Winter 2022", "stage": "Early", "team_size": 30, "subindustry": "Fintech -> Credit and Lending", "urgency": 8, "market_size": 9, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 4, "uniqueness": 5, "speed_to_market": 4, "upfront_investment": 3, "upsell_potential": 8, "evergreen_potential": 9, "total_score": 61, "replicability": 3, "niche_category": "Lending", "reasoning": "BNPL for 200M underbanked LatAm consumers without credit cards is a massive opportunity. The credit risk of underbanked populations is the primary challenge. Merchant integration provides distribution, and successful execution could build a large credit bureau-like data asset."}, {"id": 25876, "name": "Numida", "one_liner": "Working capital for African micro businesses", "long_description": "Numida provides working capital loans to African micro businesses. Instead of borrowing from informal lenders or family, micro business owners download the Numida app, apply in minutes, and receive capital within a day. We have figured out how to score and disburse unsecured loans to cash-based businesses that have no digital transaction history, while maintaining excellent collection rates. Since 2021 we have provided $23M in working capital to 32,000 businesses in East Africa. \r\n", "website": "https://numida.com", "status": "Active", "batch": "Winter 2022", "stage": "Early", "team_size": 115, "subindustry": "Fintech -> Credit and Lending", "urgency": 9, "market_size": 8, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 5, "uniqueness": 6, "speed_to_market": 3, "upfront_investment": 2, "upsell_potential": 8, "evergreen_potential": 9, "total_score": 61, "replicability": 3, "niche_category": "Lending", "reasoning": "Numida addresses a critical working capital gap for African micro businesses, a massive underserved market with hair-on-fire urgency. Scoring unsecured loans to cash-based businesses is extremely hard to replicate and requires deep local expertise. Capital-intensive but with strong expansion potential across financial products."}, {"id": 25918, "name": "Venue.ink", "one_liner": "Software for tattoo artists and studios", "long_description": "Venue.ink is a booking app for tattoo artists and studios. Receive bookings, manage your calendar, chat with clients and get paid. We help artists spend more time on art, and less time on admin.", "website": "https://venue.ink", "status": "Active", "batch": "Winter 2022", "stage": "Early", "team_size": 9, "subindustry": "Fintech -> Payments", "urgency": 5, "market_size": 3, "pricing_potential": 5, "acquisition_cost": 6, "delivery_cost": 8, "uniqueness": 7, "speed_to_market": 7, "upfront_investment": 7, "upsell_potential": 6, "evergreen_potential": 7, "total_score": 61, "replicability": 7, "niche_category": "Payments", "reasoning": "Venue.ink targets the niche tattoo industry with booking and payments, solving real admin pain for artists. The market is small but underserved with strong community dynamics for word-of-mouth growth. Relatively easy to build but defensibility comes from network effects within the tattoo community."}, {"id": 26755, "name": "Sunlight", "one_liner": "The Universal Card-On-File API", "long_description": "Sunlight is an API to change the card-on-file with apps and subscription services. Fintechs use Sunlight to automatically make their cards top-of-wallet as soon as they're issued. \r\n\r\nMerchants, service providers and subscriptions-based businesses everywhere now offer their customers the ability to save a debit/credit card on file, so they can pay their bills on time, buy in one click, or earn rewards. In 2021, 79% of consumers worldwide reported already having at least one payment card saved with a service or being open to doing so. \r\n\r\nIn recent years, card-issuing as-a-service has become mainstream: any company can now start their own card business in a matter of weeks. Last year, the number of new payment cards issued was at an all-time high. For users, however, switching banks or opening a new card now comes with an additional hurdle: they need to update their payment info across the internet. On the other side of that equation, card issuers have no visibility or control over the card-on-file updating process, and as a result struggle to get their new users to switch their spend from their old card to the new one, leading to low conversion rates and missed revenue opportunities.\r\n\r\nUntil Sunlight.\r\n\r\nWith our universal get-your-card-on-file API, FIs can now offer their users, at any point in their journey, a quick and easy way to update their debit/credit card info everywhere they shop or pay online, without ever leaving their Apps.\r\n\r\nThe Sunlight API works on every platform that has a card-on-file option (think Uber, Amazon, Netflix, DoorDash, Starbucks and so many more…), is as seamless as a Plaid connection, and always gets the card number and CVV code right on the first try!", "website": "https://www.sunlightapi.com/", "status": "Active", "batch": "Summer 2022", "stage": "Early", "team_size": 6, "subindustry": "Fintech", "urgency": 6, "market_size": 6, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 8, "uniqueness": 7, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 6, "evergreen_potential": 7, "total_score": 61, "replicability": 4, "niche_category": "Infrastructure/API", "reasoning": "Sunlight's card-on-file API helps fintechs automatically become top-of-wallet across subscription services. Clever infrastructure play that directly drives card usage and interchange revenue for issuers. The API model is scalable but requires deep merchant integrations to build the network."}, {"id": 26897, "name": "AviaryAI", "one_liner": "Outbound AI voice agents for the financial services industry", "long_description": "AviaryAI is the industry's first outbound AI service team for banks, credit unions, and insurance companies. In a landscape where only 18% of financial service providers make proactive outbound calls and rely heavily on emails, AviaryAI offers a groundbreaking solution. Powered by a private LLM, our suite of products helps institutions leverage Generative AI while adhering to stringent regulatory and compliance standards.", "website": "http://www.helloaviary.ai", "status": "Active", "batch": "Summer 2022", "stage": "Early", "team_size": 10, "subindustry": "Fintech", "urgency": 6, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 4, "delivery_cost": 7, "uniqueness": 6, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 7, "evergreen_potential": 7, "total_score": 61, "replicability": 5, "niche_category": "Banking", "reasoning": "AviaryAI targets the underserved outbound communication gap in financial services where only 18% make proactive calls. Building a compliant AI voice agent for financial services requires domain expertise and regulatory knowledge. Good expansion potential across banking, credit unions, and insurance verticals."}, {"id": 27832, "name": "Trigo", "one_liner": "Rent verification API for landlords and lenders", "long_description": "Trigo aggregates consumer rent history to help landlords approve better tenants and lenders write more loans. No solution exists to consistently furnish this rent verification to landlords and lenders today. The largest database has only 3% coverage of rent data.\r\n\r\nTrigo is a Consumer Reporting Agency (CRA) that provides this missing rent data set through a real-time API and web application. We are repeat founders with consumer data and finance experience across Harvard, Citigroup, Experian, and Amazon.", "website": "https://trigodata.com/", "status": "Acquired cessing in Sub-Saharan Africa is critical infrastructure with high switching costs. Reducing fraud and integration time directly impacts revenue. The market requires heavy investment in compliance and banking partnerships but top-5 TPV position shows strong traction."}, {"id": 29613, "name": "ClaimSorted", "one_liner": "Making it easy for insurance companies to process claims", "long_description": "ClaimSorted helps insurance companies remove the hassle of managing claims by enabling them to outsource their claim operations to us. This service is known as a Third Party Administrator (TPA). Unlike traditional TPAs, we blend AI and best-in-class experts to deliver a 5-star customer experience, minimise mistakes and speed up claim assessment.", "website": "https://claimsorted.com", "status": "Active", "batch": "Summer 2024", "stage": "Early", "team_size": 20, "subindustry": "Fintech -> Insurance", "urgency": 7, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 5, "uniqueness": 6, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 7, "evergreen_potential": 9, "total_score": 61, "replicability": 4, "niche_category": "Insurance", "reasoning": "Claims processing outsourcing (TPA) enhanced with AI is a large ongoing need for insurers. Blending AI with expert adjusters provides better outcomes than pure automation. The claims management market is permanent, though traditional TPAs are established competitors with deep client relationships."}, {"id": 29836, "name": "TradeFlow", "one_liner": "AI-powered settlement for financial securities", "long_description": "TradeFlow is AI-powered settlement for financial securities. During her time in financial services, Taryn saw firsthand how inefficient and costly it is to settle trades. Historically, it’s been difficult to improve this process because it’s heavily reliant on manual emails, disparate systems, and inconsistently structured data. However, the advent of powerful AI technology allows us to unlock greater automation than ever before. TradeFlow empowers back offices to do more with less by offloading these time-intensive tasks to AI.", "website": "https://www.tradeflowai.com/", "status": "Active", "batch": "Summer 2024", "stage": "Early", "team_size": 2, "subindustry": "Fintech", "urgency": 7, "market_size": 7, "pricing_potential": 8, "acquisition_cost": 4, "delivery_cost": 7, "uniqueness": 6, "speed_to_market": 3, "upfront_investment": 4, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 61, "replicability": 3, "niche_category": "Infrastructure/API", "reasoning": "AI-powered trade settlement addresses a real inefficiency involving manual emails and disparate systems. Financial institutions have high willingness to pay for settlement improvements. However, the space is heavily regulated and requires deep integration with existing financial infrastructure."}, {"id": 30106, "name": "Sunset", "one_liner": "Find and move money after a death", "long_description": "Sunset can track down bank accounts, retirement accounts, investment accounts, property and more for families after losing a loved one. Sunset will close those accounts and move the money into a Sunset estate account to manage.", "website": "https://www.hellosunset.com/", "status": "Active", "batch": "Fall 2024", "stage": "Early", "team_size": 5, "subindustry": "Fintech -> Consumer Finance", "urgency": 8, "market_size": 5, "pricing_potential": 7, "acquisition_cost": 4, "delivery_cost": 5, "uniqueness": 8, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 6, "evergreen_potential": 10, "total_score": 61, "replicability": 3, "niche_category": "Consumer Finance", "reasoning": "Sunset addresses a deeply emotional, urgent problemâ€”managing finances after a death. The market is niche but evergreen since death is permanent. Complexity of tracking accounts across institutions and regulatory requirements creates strong barriers to replication."}, {"id": 30285, " ion creates enormous TAM. The UPI integration is smart for the Indian market but the company was acquired, and competition from established players like Slice and OneCard is intense."}, {"id": 23776, "name": "Palla", "one_liner": "P2P Cross border payments", "long_description": "Palla enables instant P2P payments from the US to other countries, a $65BN a year market. Sending and receiving remittances today is slow, time consuming and inconvenient for all parties, as it's a mostly cash based process. With Palla, senders in the US can do it in a few taps of their phone and receivers get their money in seconds. ", "website": "https://www.palla.com", "status": "Active", "batch": "Summer 2021", "stage": "Early", "team_size": 22, "subindustry": "Fintech -> Payments", "urgency": 8, "market_size": 8, "pricing_potential": 5, "acquisition_cost": 5, "delivery_cost": 6, "uniqueness": 5, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 6, "evergreen_potential": 9, "total_score": 60, "replicability": 4, "niche_category": "Payments", "reasoning": "Palla enables instant P2P cross-border remittances from the US, targeting the $65B/year market. Remittances are a critical, urgent need for migrant communities. The market is large and enduring but competitive with Wise, Remitly, and Western Union. Digital-first approach reduces costs."}, {"id": 23959, "name": "TAG", "one_liner": "TAG is the First Digital Bank (Chime/Revolut/N26) for Pakistan", "long_description": "TAG is setting new standards and changing the way Pakistan banks by building a digital bank for the masses, with an aim to encompass the entire financial life of users, from basic banking such as bank account and Visa Debit card to employer payrolls, salary advances, savings, and neo-brokerage in future.", "website": "https://tagme.pk/", "status": "Active", "batch": "Summer 2021", "stage": "Early", "team_size": 36, "subindustry": "Fintech -> Banking and Exchange", "urgency": 8, "market_size": 7, "pricing_pote

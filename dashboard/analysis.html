Chart.register(ChartDataLabels);
Chart.defaults.set('plugins.datalabels', { display: false });

    plugins: {
      datalabels: { display: true, color: '#fff', font: { weight: 'bold', size: 14 }, formatter: v => v },

    cutout: '55%',

});

AD.niche_stats.forEach(n => {
  const opt = document.createElement('option');
  opt.value = n.niche;
  opt.textContent = n.niche;
  npSelect.appendChild(opt);
});
let npChart = null;
function renderNicheProfile() {
  const niche = npSelect.value;
  const ns = AD.niche_stats.find(n => n.niche === niche);
  if (!ns) return;
  if (npChart) npChart.destroy();
  npChart = new Chart(document.getElementById('nicheProfileChart'), {
    type: 'radar',
    data: {
      labels: DIM_LABELS,
      datasets: [

    options: { scales: { r: { min: 0, max: 10, ticks: { stepSize: 2 } } }, plugins: { datalabels: { display: false } } }

}

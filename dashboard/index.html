tors across the region."}, {"id": 24461, "name": "Mine (formerly Fizz)", "one_liner": "The AI personal finance company. ", "long_description": "Mine is the personal finance app designed to help you get ahead.\r\n\r\nFounded on the idea that financial independence begins with ownership — of your money, your momentum, and your decisions.\r\n\r\nWe make the credit-builder thousands know and love, with budgeting and spend tracking features meant to help your money be the best version of itself. We’re also the makers of MoneyGPT, the money assistant that’s got your back.\r\n\r\nYoung people today are stepping into a financial world built for someone else’s life.\r\n\r\nWe give young adults the confidence and control to take charge of their financial journey with simple tools, smart guidance, and a system that works for the path you choose.\r\n\r\nLet’s build your future together. Get started at usemine.com\r\n\r\nBacked by Kleiner Perkins, SV Angel, Liquid 2 Ventures, and the founders of Handshake, Postmates, Public.com, Motive and many more.", "website": "https://usemine.com/", "status": "Active", "batch": "Summer 2021", "stage": "Early", "team_size": 18, "subindustry": "Fintech -> Consumer Finance", "urgency": 6, "market_size": 8, "pricing_potential": 5, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 4, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 60, "replicability": 5, "niche_category": "Consumer Finance", "reasoning": "Mine offers credit-building and personal finance tools powered by AI. The personal finance app space is crowded (Credit Karma, Mint successors), but the credit-builder angle has proven product-market fit. AI personalization could differentiate but the core concept is well-established."}, {"id": 24540, "name": "Floatpays Inc", "one_liner": "On-demand wage access service built for the African market", "long_description": "Floatpays is an on-demand wage access platform that helps rations:\r\n\r\nPID payment button:\r\nEnd-to-end, white label, native, non-redirection payment technology for your customers to pay you account-to-account more efficiently than PSE, without heavy and inefficient ACH cycles and fixed rates.\r\n\r\nTechnology: API, SDK, Checkout UI.\r\n\r\nImmediate disbursement:\r\nSingle API connection to all banks, allowing any company or person to disburse 24/7, in real-time, with immediate crediting of funds to third parties at any bank or digital wallet.\r\n\r\nTechnology: API, Dashboard UI.", "website": "http://www.miliopay.com", "status": "Active", "batch": "Winter 2023", "stage": "Early", "team_size": 16, "subindustry": "Fintech", "urgency": 7, "market_size": 6, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 6, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 60, "replicability": 4, "niche_category": "Payments", "reasoning": "Milio provides real-time account-to-account payments in Colombia without ACH rails, offering a faster alternative. Colombia's growing digital payment adoption creates strong tailwinds. Building direct bank integrations and regulatory approval in a single market limits initial scale but creates a defensible position."}, {"id": 29086, "name": "Eden Care", "one_liner": "Digital health insurance for employers in Africa", "long_description": "Eden Care is building a digital health insurer for employers in Africa. \r\n\r\n\r\n\r\nToday, health insurance operation costs in Africa are 2.2x the global average. Eden Care is cutting this by 43% making health insurance cheaper. \r\n\r\n\r\n\r\nThe $11Bn African health insurance market is projected to grow to $72Bn in just  12 years. We are targeting 90 million uninsured African employees.", "website": "https://www.edencaremedical.com/", "status": "Active", "batch": "Summer 2023", "stage": "Early", "team_size": 28, "subindustry": "Fintech -> Insurance", "urgency": 8, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 4, "uniqueness": 6, "speed_to_market": 3, "upfront_investment": 3, "upsell_potential": 8, "evergreen_potential": 9, "total_score": 60, "replicability": 3, "niche_category": "Insurance", "reasoning": "Health insurance for African employers is a critical need with a growing $11B market. Cutting operational costs by 43% is a strong value prop. However, insurance requires significant capital reserves, regulatory compliance across countries, and building provider networks on the ground."}, {"id": 29181, "name": "Event Horizon Labs", "one_liner": "AI-native hedge fund using agents to invest the way humans do—at scale", "long_description": "We use thousands of AI agents to automate the work of human investors—reading filings, processing news, and finding high-signal events. Our goal is to build a fully autonomous fund that outperforms the best PMs on the planet. Starting with equity long/short.\r\n\r\n", "website": "https://www.ehl.markets/", "status": "Active", "batch": "Winter 2024", "stage": "Early", "team_size": 1, "subindustry": "Fintech -> Asset Management", "urgency": 5, "market_size": 9, "pricing_potential": 9, "acquisition_cost": 8, "delivery_cost": 6, "uniqueness": 5, "speed_to_market": 3, "upfront_investment": 3, "upsell_potential": 5, "evergreen_potential": 7, "total_score": 60, "replicability": 3, "niche_category": "Wealth Management", "reasoning": "AI-native hedge funds have massive upside if they work but extremely high risk. No customers to acquire since it's a proprietary fund. The space is highly competitive with quant firms and other AI trading startups, and the fund model requires significant capital and track record to scale."}, {"id": 29500, "name": "The New Money Company", "one_liner": "Invoicing that pays you even if your buyer doesn’t", "long_description": "The New Money Company protects invoices with insurance.\r\n\r\nWe help businesses expand to buyers in new markets or  expertise, and regulatory approvals. The 70-person team size reflects the complexity."}, {"id": 29820, "name": "Kontigo", "one_liner": "USDC-Smart Neobank for Latinos. ", "long_description": "We’re building Kontigo, a USDC Smart Neobank for Latinos in the U.S. and Latin America.\r\n\r\nWe launched our Peer-to-Peer onramp 20 days ago and we’ve already had $540k in deposits, 10k active users and a +300k waitlist. \r\n\r\nThe founding team has built and scaled fintechs in Latam, and it’s ex-Venmo, Nubank, Rappi, MercadoLibre, Ualá, Platzi, and Yuno. \r\n\r\nWe’re already backed by DST Global, Soma Capital, Pioneer Fund, Transpose + 10 YC alums.\r\n\r\nSending money to Latin America is just as painful as holding it due to the region's fragmentation into 33 countries with 39 different currencies. \r\n\r\nOn one hand, cross-border payments to Latam are absurdly expensive (up to 20% per transaction). Conversely, over the past decade, currency depreciation across the region has become unsustainable. (some countries surpassing the trillion percent ). \r\n\r\nKontigo solves this with a USDC global wallet & a BTC savings account. \r\n\r\n- Like Venmo, but on-USDC.\r\n- Like Zelle, but for cross-border payments. No limits.\r\n- Like Nubank & Revolut, but without inflationary currencies. Bitcoin-backed.\r\n\r\nUser wallets are connected to an AI-private banker on WhatsApp to execute international USDC transactions. ", "website": "https://kontigo.lat/", "status": "Active", "batch": "Summer 2024", "stage": "Early", "team_size": 10, "subindustry": "Fintech -> Banking and Exchange", "urgency": 7, "market_size": 8, "pricing_potential": 5, "acquisition_cost": 6, "delivery_cost": 6, "uniqueness": 6, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 7, "evergreen_potential": 7, "total_score": 60, "replicability": 4, "niche_category": "Banking", "reasoning": "USDC-based neobank for Latinos shows strong early traction with $540K deposits and 10K users in 20 days. The 300K waitlist suggests strong demand. However, stablecoin-based banking faces regulatory uncertainty and the Latino neobank space is competitive with established players."}, {"id": 30802, "name": "Freya", "one_liner": "Voice AI for Enterprises", "long_description": "", "website": "https://freyavoice.ai/", "status": "Active", "batch": "Summer 2025", "stage": "Early", "team_size": 5, "subindustry": "Fintech", "urgency": 6, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 3, "speed_to_market": 6, "upfront_investment": 5, "upsell_potential": 7, "evergreen_potential": 7, "total_score": 60, "replicability": 6, "niche_category": "Infrastructure/API", "reasoning": "Freya provides voice AI for enterprises, tagged under fintech but with broad applicability. The voice AI space is extremely competitive with many well-funded players. Limited description makes it hard to assess fintech-specific differentiation."}, {"id": 31255, "name": "Grade", "one_liner": "Payroll for performance", "long_description": "", "website": "https://usegrade.com", "status": "Active", "batch": "Winter 2026", "stage": "Early", "team_size": 2, "subindustry": "Fintech -> Payments", "urgency": 5, "market_size": 7, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 5, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 60, "replicability": 5, "niche_category": "Payments", "reasoning": "Grade offers performance-based payroll with minimal description available. Payroll is a large, sticky market but highly competitive with established players like Gusto, Rippling, and ADP. The performance angle could differentiate but details are too sparse to fully assess."}, {"id": 415, "name": "FundersClub", "one_liner": "Online VC", "long_description": "FundersClub discovers, funds, and supports the world's best technology startups. FundersClub created the first online venture capital platform and invests starting at Seed, following on through Growth. The portfolio includes Coinbase, Instacart, Webflow, GitLab, Flexport, Rippling, and other category-defining companies.", "website": "https://fundersclub.com/", "status": "Active", "batch": "Summer 2012", "stage": "Growth", "team_size": 5, "subindustry": "Fintech -> Asset Management", "urgency": 5, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 4, "delivery_cost": 7, "uniqueness": 6, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 59, "replicability": 4, "niche_category": "Wealth Management", "reasoning": "FundersClub pioneered online venture capital, enabling accredited investors to access top-tier startup deals. The platform benefits from deal flow network effects and a strong portfolio track record (Coinbase, Instacart, etc.). Regulatory requirements for fund management and the need for quality deal access create meaningful barriers to entry."}, {"id": 682, "name": "Kash", "one_liner": "We are fixing how money works.", "long_description": "Kash is a San Francisco-based mobile payment company that clears transactions without interchange or card fees and is guaranteed against chargeback. The company gets rid of credit cards and middle-men that stand between bank accounts and retailers. It uses SecureDebit technology, a direct bank payment method that avoids the credit card network and allows retailers to save 2% to 5% in transaction processing fees. Kash uses its funding received from Draper Associates, Green Visor Capital, and Structure Capital to develop, market, and expand its mobile payments technology.", "website": "http://withkash.com", "status": "Acquired", "batch": "Summer 2014", "stage": "Early", "team_size": 11, "subindustry": "Fintech -> Payments", "urgency": 6, "market_size": 7, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 7, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 6, "evergreen_potential": 7, "total_score": 59, "replicability": 4, "niche_category": "Payments", "reasoning": "Kash attempted to eliminate interchange fees through direct bank-to-bank payments using SecureDebit technology. The zero-fee approach was differentiated but faced resistance from the entrenched card network ecosystem. Acquired, suggesting the technology had value even though disrupting card networks proved extremely challenging."}, {"id": 998, "name": "Algoriz", "one_liner": "Algoriz is an AI based algorithmic trading platform that enables you…", "long_description": "Algoriz is an AI based trading platform that enables you to build trading algorithms by simply typing your strategies in English. \n\nAlgoriz is backed by Y combinator.", "website": "http://www.algoriz.com", "status": "Inactive", "batch": "Winter 2016", "stage": "Early", "team_size": 4, "subindustry": "Fintech -> Asset Management", "urgency": 4, "market_size": 7, "pricing_potential": 6, "acquisition_cost": 6, "delivery_cost": 8, "uniqueness": 5, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 6, "evergreen_potential": 7, "total_score": 59, "replicability": 5, "niche_category": "Wealth Management", "reasoning": "Algoriz offered AI-powered algorithmic trading via natural language, an appealing concept but not an urgent need. The democratization of algo trading has a large potential market but faces competition from established platforms. The company went inactive, suggesting challenges in monetization or user retention."}, {"id": 1003, "name": "WorldCover", "one_liner": "Funding platform for global insurance, starting with crop insurance…", "long_description": "WorldCover offers peer-to-peer investments that provide insurance to the global poor. We connect a growing pool of investors who seek uncorrelated investment returns and impact from their capital with a huge and growing need for natural disaster insurance in the developing world.  \r\n\r\nWorldCover's platform improves food and income security for smallholder farmers in developing countries. More than 70% of the 2.5 billion people living at the “base of the pyramid” throughout the world rely on agriculture for income and sustenance. Farmers face a number of major risks to their livelihoods which they cannot control. Insurance gives them a sense of security even if they have a bad harvest, allowing them to improve their diets, invest in their farms, and send their children to school.\r\n\r\nIn an increasingly interconnected world, diversified markets are becoming harder and harder to find. WorldCover's investment products offer both retail and professional investors attractive yet uncorrelated returns with the world's financial markets.", "website": "https://www.worldcovr.com", "status": "Inactive", "batch": "Winter 2016", "stage": "Growth", "team_size": 20, "subindustry": "Fintech -> Insurance", "urgency": 7, "market_size": 7, "pricing_potential": 5, "acquisition_cost": 4, "delivery_cost": 6, "uniqueness": 7, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 6, "evergreen_potential": 9, "total_score": 59, "replicability": 4, "niche_category": "Insurance", "reasoning": "WorldCover addresses crop insurance for developing world farmers, a genuinely urgent need driven by climate change. The P2P investment model connecting investors with insurance needs is creative but complex. Distribution to rural farmers in developing countries is challenging and costly, though the underlying need is permanent and growing."}, {"id": 1303, "name": "Lendsnap", "one_liner": "The Digital Mortgage Company.", "long_description": "The Digital Mortgage Company\r\n\r\nLenders will write $1.5T of home mortgages in 2017, and will have to evaluate every single borrower's ability to repay. This is expected to cost the industry $15B in human labor. We talked to these humans, and learned that they spend 1/3 of their time just asking other humans for documents and data that are almost universally available online. While the market is slowly moving to transactional data, Lendsnap is the only company helping lenders get ahead of the competition by delivering original electronic documents and data sets. That means portfolios of our lender customers stay completely liquid in the secondary market. No one else can offer that today.\r\n\r\nLendsnap instantly gathers the original borrower documents and data for lenders by linking to consumer financial accounts. We increase loan origination team productivity by 25%+ and save applicants several hours on each application as well. Our intuitive and easy-to-use workflow makes it easy and safe for borrowers to turn in and for loan officers to receive the necessary documents for lenders to make a credit decision.\r\n\r\nAs the only company delivering the right documents and data to originate non-agency loans such as VA, FHA, and subprime, we are able to work with all types of lenders. Furthermore, we are uniquely suited to serve mortgage brokers (12% market share) who have to remain flexible to the credit needs of their diverse borrowers. We are the only post-launch company that delivers actual electronic statements straight from source institutions, such as Bank of America, TurboTax, Chase, and hundreds more.", "website": "http://url", "status": "Inactive", "batch": "Summer 2016", "stage": "Early", "team_size": 0, "subindustry": "Fintech -> Banking and Exchange", "urgency": 6, "market_size": 8, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 4, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 5, "evergreen_potential": 8, "total_score": 59, "replicability": 5, "niche_category": "Lending", "reasoning": "Lendsnap aimed to digitize mortgage origination, a large market with clear efficiency gains. However, the company went inactive with zero team members, suggesting execution challenges. The mortgage tech space is crowded with competitors like Better.com and Blend."}, {"id": 1464, "name": "Ledger Investing", "one_liner": "Marketplace for insurance securitization.", "long_description": "Ledger Investing provides an exciting opportunity for asset managers, pension funds, hedge funds, family offices and other institutions interested in earning a great return through insurance investing.\r\n\r\nThe company deploys proprietary software and data analytics covering many types of insurance risk portfolios. The technology enables insurers to securitize risk more efficiently while providing investors, asset managers, pension funds, hedge funds, family offices, and other institutions an opportunity to invest in a new and growing asset class.\r\n\r\nLedger Investing was founded by Julien Brissonneau, Aymeric Rabot and Samir Shah in 2016.", "website": "https://ledgerinvesting.com/", "status": "Active", "batch": "Winter 2017", "stage": "Growth", "team_size": 85, "subindustry": "Fintech -> Insurance", "urgency": 6, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 4, "delivery_cost": 6, "uniqueness": 7, "speed_to_market": 3, "upfront_investment": 3, "upsell_potential": 7, "evergreen_potential": 9, "total_score": 59, "replicability": 3, "niche_category": "Insurance", "reasoning": "Ledger Investing provides a marketplace for insurance securitization, connecting institutional capital with insurance risk. The platform addresses a real need for capital efficiency in insurance and offers a unique data-driven approach. Regulatory complexity and the need for institutional relationships make this hard to replicate."}, {"id": 1471, "name": "Zinc Platform", "one_liner": "Insurance Distribution Infrastructure", "long_description": "Zinc Platform, Inc. is focused on providing software that digitizes the last frontier of the mortgage origination process– getting homeowners insurance. Zinc builds technology that integrates with the core systems of today’s modern mortgage lenders to power digital portals for borrowers to procure the homeowners (property) insurance that is required to close a mortgage. Zinc’s technology takes a broken, week-long process and turns it into a delightful five-minute experience. For borrowers, Zinc powers access to all of the nation’s leading insurance carriers. For mortgage lenders, Zinc ensures compliance with underwriting requirements while automating more of the mortgage closing process. Zinc is proudly built in New York City by passionate technologists and business strategists focused on making the process of buying a home a more simple, delightful experience", "website": "http://www.zincplatform.com", "status": "Inactive", "batch": "Winter 2017", "stage": "Early", "team_size": 11, "subindustry": "Fintech -> Insurance", "urgency": 6, "market_size": 6, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 6, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 5, "evergreen_potential": 8, "total_score": 59, "replicability": 5, "niche_category": "Insurance", "reasoning": "Zinc Platform digitized homeowners insurance procurement within mortgage origination. The integration with mortgage lender systems is valuable but niche. The company went inactive, suggesting the market may have been too narrow or competition from established insurance tech players was too strong."}, {"id": 1652, "name": "Piggy", "one_liner": "App for Indians to make investments in mutual funds, manage their…", "long_description": "Experience an easy way to make Investments in Mutual funds in India.\r\n\r\nEasiest platform to make mutual fund investments in India.\r\nBecause you need to make Investments, be it just to park your cash short term to earn better returns, or to invest for your goals or retirement, we've made an easy to use platform for you where you can invest in any fund in India in few clicks and have track your existing investments.\r\n\r\nFurthermore , you make investments without paying any middlemen commissions and make more returns . After all, It is your money. Don't pay too much to others when you can do it on your own.\r\n\r\nWe're on both Android and iOS . download the app to get started \r\nhttps://piggy.co.in", "website": "https://piggy.co.in", "status": "Inactive", "batch": "Summer 2017", "stage": "Early", "team_size": 2, "subindustry": "Fintech -> Asset Management", "urgency": 5, "market_size": 8, "pricing_potential": 4, "acquisition_cost": 6, "delivery_cost": 8, "uniqueness": 3, "speed_to_market": 6, "upfront_investment": 5, "upsell_potential": 6, "evergreen_potential": 8, "total_score": 59, "replicability": 6, "niche_category": "Wealth Management", "reasoning": "Piggy offered easy mutual fund investing in India, a huge market but increasingly crowded with players like Groww and Zerodha. The app-based investment platform has low delivery costs but limited pricing power as commissions compress. The company went inactive despite the massive addressable market."}, {"id": 1690, "name": "Goodcover", "one_liner": "Digital Co-op Renters Insurance = half the price, better coverage.", "long_description": "Goodcover provides its Members with Good Renters Insurance for 50% less than legacy companies and an Annual Dividend of the money left over after claims obligations are met.\r\n\r\nGoodcover is a Managing General Agent (MGA) that administers personal insurance on behalf of our Membership, a bit like how USAA does it.\r\n\r\nMember's premiums are pooled and used to pay claims.  We take a fixed fee, and the remainder is returned in our Annual Member Dividend.\r\n\r\nWe work with multi-billion dollar capital partners to ensure regulations are followed, adequate claims capital is always available, and we have emergency capacity for catastrophes.\r\n\r\nTechnology allows us to eliminate waste, saving roughly 25% of the cost.  We are 100% digital, but not bots - we invest in tech that enables our experts to help Members.\r\n\r\nAs an Invitation Only Membership served by an MGA, **we can give Members Free Insurance** when they invite others, turning our \"Marketing Budget\" into savings for Members.  This eliminates Lizards and Sales Agents, saving the other 25%.\r\nWe do not use the standard industry models, instead using a multiperil model to more granularly price risk.  This means that for a few of you we are more expensive... but everyone else pays much less than they would otherwise pay.\r\n\r\nOur granular, multiperil model allows us to offer a superior policy over the standard market including:\r\n    - coverage for if your place is flooded by a neighbor\r\n    - Replacement Cost Coverage (meaning new stuff for your old)\r\n    - All Risk coverage for high value items you tell us about - including computers (almost no one does that amazingly)\r\n    - added coverage for mold removal\r\n\r\nOur MGA business model allows us to be capital efficient, \"renting\" capacity as we need it.\r\n\r\nAll this adds up to our government approved pricing being 40-60% cheaper on average than that of our competitors. ", "website": "http://www.goodcover.com", "status": "Active", "batch": "Summer 2017", "stage": "Growth", "team_size": 1, "subindustry": "Fintech -> Insurance", "urgency": 5, "market_size": 6, "pricing_potential": 5, "acquisition_cost": 6, "delivery_cost": 7, "uniqueness": 7, "speed_to_market": 5, "upfront_investment": 4, "upsell_potential": 5, "evergreen_potential": 9, "total_score": 59, "replicability": 4, "niche_category": "Insurance", "reasoning": "Goodcover offers cooperative renters insurance at 50% less than legacy companies with an annual dividend model. The co-op model is differentiated and appealing to cost-conscious renters. However, the renters insurance market is a subset of the broader insurance market, and the 1-person team suggests scalability challenges."}, {"id": 1992, "name": "Fintual", "one_liner": "Wealth manager", "long_description": "We allow people to invest.\r\n\r\nWe manage USD 1.8B from +200,000 customers. \r\n\r\nWe are regulated in Mexico and Chile.", "website": "https://fintual.com", "status": "Active", "batch": "Summer 2018", "stage": "Growth", "team_size": 100, "subindustry": "Fintech -> Consumer Finance", "urgency": 6, "market_size": 7, "pricing_potential": 6, "acquisition_cost": 6, "delivery_cost": 7, "uniqueness": 5, "speed_to_market": 3, "upfront_investment": 3, "upsell_potential": 7, "evergreen_potential": 9, "total_score": 59, "replicability": 3, "niche_category": "Wealth Management", "reasoning": "Fintual manages $1.8B for 200K+ customers in Chile and Mexico, proving product-market fit in Latin American wealth management. Regulated financial services create barriers but also limit speed to market. Evergreen demand for investing with strong upsell into additional financial products."}, {"id": 2002, "name": "Nova", "one_liner": "Digital subscriptions that delight investors.", "long_description": "Nova centralizes digital subscriptions, data room, and ongoing investor communication in a single investor management platform for private funds.", "website": "https://novahq.com", "status": "Acquired", "batch": "Summer 2018", "stage": "Growth", "team_size": 12, "subindustry": "Fintech", "urgency": 5, "market_size": 5, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 8, "uniqueness": 6, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 6, "evergreen_potential": 7, "total_score": 59, "replicability": 5, "niche_category": "Infrastructure/API", "reasoning": "Nova centralizes digital subscriptions and investor communications for private funds. Niche B2B SaaS with moderate market size but good pricing potential from fund managers. Acquired status suggests product had enough value to attract a buyer."}, {"id": 2012, "name": "Cowrywise", "one_liner": "Digitizing wealth management in Africa", "long_description": "Cowrywise is a FinTech company democratizing access to premium financial services by making these services available to the mass market cheaply. We are leveraging technology and investment management to re-imagine how financial planning, savings and investment products are delivered to people. We do this by helping our customers achieve their savings and investments goals in a simple, secure and affordable manner.", "website": "https://cowrywise.com", "status": "Active", "batch": "Summer 2018", "stage": "Early", "team_size": 40, "subindustry": "Fintech -> Asset Management", "urgency": 6, "market_size": 7, "pricing_potential": 5, "acquisition_cost": 6, "delivery_cost": 7, "uniqueness": 5, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 59, "replicability": 4, "niche_category": "Wealth Management", "reasoning": "Cowrywise democratizes wealth management in Africa, targeting the mass market with accessible savings and investment products. Africa's growing middle class represents a large opportunity. Competition from banks and other fintechs exists but digital-first approach provides advantage."}, {"id": 12240, "name": "Zippi", "one_liner": "Payment Platform for LatAm Micro and Small Businesses", "long_description": "Developer of a personal loans provider platform intended to benefit self-employed people financially. The company's platform offers weekly invoices, and payment through an application and does not charge an annual fee, enabling clients to focus on their business growth.", "website": "https://www.zippi.com.br", "status": "Active", "batch": "Summer 2019", "stage": "Early", "team_size": 60, "subindustry": "Fintech -> Credit and Lending", "urgency": 8, "market_size": 8, "pricing_potential": 5, "acquisition_cost": 6, "delivery_cost": 6, "uniqueness": 5, "speed_to_market": 3, "upfront_investment": 3, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 59, "replicability": 3, "niche_category": "Lending", "reasoning": "Zippi provides personal loans and payment tools for LatAm micro and small businesses. High urgency as MSMBs in LatAm are chronically underserved by traditional banks. Requires lending capital and credit risk expertise, but the massive addressable market of self-employed workers drives high potential."}, {"id": 12300, "name": "Atlas", "one_liner": "Modern spend management & concierge.", "long_description": "", "website": "https://atlascard.com", "status": "Active", "batch": "Winter 2019", "stage": "Growth", "team_size": 25, "subindustry": "Fintech -> Consumer Finance", "urgency": 6, "market_size": 7, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 8, "uniqueness": 4, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 59, "replicability": 4, "niche_category": "Consumer Finance", "reasoning": "Atlas provides modern spend management and concierge services. The expense management space is competitive with Brex, Ramp, and Divvy. Limited description makes it hard to assess differentiation, but spend management is an evergreen business need."}, {"id": 12344, "name": "Accept.inc (formerly BoardRE)", "one_liner": "BoardRE is a new type of mortgage company that upgrades any offer…", "long_description": "In a transaction powered by Board, sellers and agents are doing business with Board -- not the buyer.  We act as an intermediary buyer of a home, using our cash to buy homes for the 80% of homebuyers who need and qualify for a mortgage. By removing the lender from real estate transactions,  sellers and agents to close in as little as 2-3 days and buyers can lock-in their homes of choice at the best possible price before closing on their mortgage. \r\n\r\nWith Board, buyers can \"Buy Now. Mortgage Later\" so everyone can have a cash deal.  \r\n\r\nWe differentiate ourselves from others in the \"iBuyer\" market by allowing anyone to have an all cash deal as opposed to buying, fixing and flipping properties for ourselves (e.g. Opendoor, OfferPad...etc). Board works directly with national lenders to evaluate the creditworthiness of buyers upfront and will use a short term credit facility to facilitate the purchasing of homes. \r\n\r\n", "website": "http://www.accept.inc", "status": "Acquired", "batch": "Winter 2019", "stage": "Early", "team_size": 80, "subindustry": "Fintech -> Credit and Lending", "urgency": 8, "market_size": 9, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 4, "uniqueness": 8, "speed_to_market": 2, "upfront_investment": 1, "upsell_potential": 6, "evergreen_potential": 9, "total_score": 59, "replicability": 1, "niche_category": "Lending", "reasoning": "Accept.inc acts as a cash intermediary buyer for mortgage-dependent homebuyers, a highly innovative model that removes lender friction from real estate. Requires massive capital to buy homes with cash, making upfront investment and replicability extremely low. The US mortgage market is enormous and evergreen."}, {"id": 12631, "name": "Fynn", "one_liner": "SoFi for trade students", "long_description": "Fynn helps people afford trade school in the US. We bring fair and affordable private loans to the trade space, to help students pursue in-demand careers like electricians, nurses, welders, or pharmacists.\r\n", "website": "https://www.fynncredit.com", "status": "Active", "batch": "Summer 2019", "stage": "Early", "team_size": 26, "subindustry": "Fintech -> Credit and Lending", "urgency": 7, "market_size": 6, "pricing_potential": 6, "acquisition_cost": 6, "delivery_cost": 6, "uniqueness": 6, "speed_to_market": 4, "upfront_investment": 3, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 59, "replicability": 4, "niche_category": "Lending", "reasoning": "Trade school financing fills a real gap as traditional student lenders focus on 4-year degrees. The trade workforce is growing and underserved, but lending requires significant capital reserves and underwriting capabilities. Strong mission alignment with workforce development trends."}, {"id": 12829, "name": "Gotrade", "one_liner": "Robinhood for Southeast Asia (SEA)", rienced firsthand the struggles of funding a business - from expensive equity options to loans that required personal guarantees.\r\n\r\nWe went live in Singapore first to validate the product/market fit. We plan to expand across the APAC region..\r\n\r\nOur sweet spot is backing repeatable business spend - expenses that leads to increased revenue. Our financing product allows businesses to keep growing with us over time. Over a third of our advances today are from repeat borrowers.\r\n\r\nWe created a brand new asset class in Asia - offering flexible repayment options, such as tieing repayment with sales. Business owners LOVE this.\r\n\r\nOur automated financial technology platform ingests revenue and alternative data sources that gives us a proprietary edge in understanding the behavior of our borrowers. As we collect continuous data, we are able to offer better financial and technology solutions, while mitigating our downside risk.\r\n\r\nFunds are seamlessly deployed via our virtual Jenfi Wallet and MasterCard solution, giving borrowers flexibility to make payments while giving Jenfi real-time tracking of their spend.\r\n\r\nRecent coverage: \r\nhttps://techcrunch.com/2020/02/03/jenfi-wants-to-solve-small-business-lending-in-southeast-asia/", "website": "http://jenfi.com/", "status": "Active", "batch": "Winter 2020", "stage": "Early", "team_size": 18, "subindustry": "Fintech -> Credit and Lending", "urgency": 8, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 5, "uniqueness": 5, "speed_to_market": 4, "upfront_investment": 3, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 59, "replicability": 4, "niche_category": "Lending", "reasoning": "Jenfi provides revenue-based financing for digital businesses in Asia, addressing a critical funding gap where 50-70% of bankable businesses can't access capital. The model aligns repayment with revenue which reduces default risk. Capital-intensive by nature requiring significant debt facilities, but the underserved Asian SMB market presents strong growth potential."}, {"id": 22052, "name": "OneKey", "one_liner": "Find the most profitable sites to build EV charging station", "long_description": "Find the most profitable sites to build EV charging station", "website": "https://getonekey.io", "status": "Inactive", "batch": "Summer 2020", "stage": "Early", "team_size": 3, "subindustry": "Fintech -> Consumer Finance", "urgency": 5, "market_size": 6, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 8, "uniqueness": 5, "speed_to_market": 6, "upfront_investment": 6, "upsell_potential": 5, "evergreen_potential": 7, "total_score": 59, "replicability": 6, "niche_category": "Other", "reasoning": "OneKey helps find profitable EV charging station locations, a data analytics play tangential to fintech. The EV market is growing but this is more of a site selection tool than a financial product. The company is inactive, suggesting execution challenges, and the tool could be replicated with public data and analytics."}, {"id": 23063, "name": "Striga", "one_liner": "Compliant Crypto and Banking Infrastructure", "long_description": "Striga is building infrastructure for digital assets and financial services as a single set of APIs doing the heavy lifting of security and regulatory compliance. Striga's customers include early stage FinTech's, Web3 innovators, Banking Institutions and Crypto Exchanges utilizing services spanning the range of Crypto Custody, Trading, Card Issuing and Banking. Building a crypto business today is a highly regulated space unlike a few years ago and maintaining a compliance program and building technology presents a huge barrier to entry for startups and mid-size businesses alike and the Striga platform solves the problem with a single set of APIs and a single contract to deliver services to 30 countries today.", "website": "https://striga.com/", "status": "Acquired", "batch": "Winter 2021", "stage": "Early", "team_si ": "Payments", "reasoning": "Union54/ChitChat combines messaging with payments and USD card capabilities for Africa. Integrating communication with money movement addresses real needs in African cross-border payments. The combined approach is differentiated but requires building two products simultaneously."}, {"id": 24244, "name": "Bree", "one_liner": "Chime for Canada, starting with cash advances", "long_description": "Bree is building a challenger bank for the 11 million Canadians living paycheck to paycheck, starting with interest-free cash advances. We make money through tips and an optional, same-day express fee. By solving our customers' most urgent problem—illiquidity between paychecks —our cash advance business is a cheap, but profitable and repeatable hook that builds distribution for a broader challenger bank. This represents a $9 billion revenue opportunity in Canada.", "website": "https://www.trybree.com/", "status": "Active", "batch": "Summer 2021", "stage": "Early", "team_size": 2, "subindustry": "Fintech -> Consumer Finance", "urgency": 8, "market_size": 7, "pricing_potential": 5, "acquisition_cost": 5, "delivery_cost": 6, "uniqueness": 4, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 8, "evergreen_potential": 8, "total_score": 59, "replicability": 4, "niche_category": "Consumer Finance", "reasoning": "Bree targets a genuine pain point for 11M Canadians living paycheck to paycheck. The cash advance model is proven (Chime, Dave in US) but faces regulatory scrutiny. Strong upsell into full banking services, but competitive landscape is intensifying in Canadian neobanking."}, {"id": 24349, "name": "Arrow", "one_liner": "Modern Checkout Platform for D2C brands in Southeast Asia", "long_description": "Arrow makes it easier and faster for sellers and shoppers to safely sell and buy online in Southeast Asia. It is  first in Southeast Asia to provide brands a better, more profitable checkout experience for their shoppers. Arrow was creat g platform offering multi-asset access. As a market leader in an emerging market with low investing penetration, there is strong growth potential. However, competing investment platforms exist and regulatory changes could impact operations."}, {"id": 24599, "name": "Female Invest", "one_liner": "Female Invest is a social e-learning app for finance and investing ", "long_description": "Female Invest is on a mission to close the financial gender gap. By creating a safe space and a trusted source for knowledge, we’re democratising investing for everyone globally. \r\n\r\nWe’ve supported more than half a million women across 100 countries with our services. This makes us the world's largest univers combining financial learning and community. \r\n\r\nCurrently, we make $5.2 million in ARR from approx. 43.000 paying users. 92% of our users are on a yearly plan, and average churn is 2.4% in the last 3 months. Our unit economics are best in class and consistently improving .\r\n\r\nWe’ve raised approximately $12 million in seed funding from prominent investors across the EU and US and are soon ready to raise our Series A, where we are aiming to close an additional $10-15 million. The company operates within FinTech, EdTech and Investing. \r\n\r\nIn 2022, Female Invest did its first acquisition by acquiring the Danish investing platform, GAIA Technologies A/S. \r\n\r\nThe company’s headquarter is located in Copenhagen and has a smaller office in London.\r\n\r\nDownload our app to get the full experience. ", "website": "https://www.femaleinvest.com/", "status": "Active", "batch": "Summer 2021", "stage": "Early", "team_size": 35, "subindustry": "Fintech", "urgency": 4, "market_size": 7, "pricing_potential": 4, "acquisition_cost": 5, "delivery_cost": 8, "uniqueness": 6, "speed_to_market": 6, "upfront_investment": 6, "upsell_potential": 6, "evergreen_potential": 7, "total_score": 59, "replicability": 6, "niche_category": "Consumer Finance", "reasoning": "Female Invest addresses _category": "Wealth Management", "reasoning": "Securities-backed lending for HNWIs through RIAs targets a high-value market with strong pricing potential. The hybrid mortgage offering is differentiated. However, requires significant capital partnerships and regulatory approvals, making it hard to replicate but also hard to start."}, {"id": 29343, "name": "Infinity", "one_liner": "Business banking for cross-border SMBs & Startups", "long_description": "Infinity is a banking and payments platform for cross-border businesses in India. We help our customers make cross-border payments that are 70% cheaper than traditional methods and earn income on idle cash by investing in government securities.", "website": "https://www.infinityapp.in/", "status": "Active", "batch": "Winter 2024", "stage": "Early", "team_size": 15, "subindustry": "Fintech -> Payments", "urgency": 7, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 5, "uniqueness": 5, "speed_to_market": 3, "upfront_investment": 3, "upsell_potential": 8, "evergreen_potential": 9, "total_score": 59, "replicability": 3, "niche_category": "Banking", "reasoning": "Cross-border banking for Indian businesses addresses a real pain with 70% cost savings. India's growing international trade creates strong tailwinds. However, the space requires heavy regulatory compliance, banking partnerships, and competes with established players like Razorpay and others."}, {"id": 29515, "name": "NowHouse", "one_liner": "NowHouse helps stock brokerages settle trades instantly.", "long_description": "NowHouse helps stock brokerages settle trades instantly.", "website": "https://www.nowhouse.io", "status": "Active", "batch": "Winter 2024", "stage": "Early", "team_size": 0, "subindustry": "Fintech", "urgency": 7, "market_size": 7, "pricing_potential": 8, "acquisition_cost": 4, "delivery_cost": 6, "uniqueness": 6, "speed_to_market": 3, "upfront_investment": 3, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 59, "replicability": 3, "niche_category": "Infrastructure/API", "reasoning": "Instant trade settlement for brokerages addresses a real inefficiency in financial markets, especially with T+1 mandates. The market is highly regulated and requires deep integration with clearing infrastructure. Minimal description suggests very early stage, but the problem space is valuable and permanent."}, {"id": 29789, "name": "Paasa", "one_liner": "Invest in Global Equities from India", "long_description": "Paasa helps wealthy Indians invest in global equities - without middlemen, hidden fees, or paperwork.\r\n\r\nWhile high-net-worths in India often have international expenses from children's education to healthcare, most still save in INR, a currency that depreciates ~2–5% per year against the USD. Why?\r\n- Broken outward remittance process\r\n- Fear of making mistakes in tax or compliance\r\n- Paper-heavy onboarding processes of international brokers\r\n- Lack of trustworthy guidance\r\n\r\nPaasa offers a mobile app that enables Indians to trade worldwide, invest passively, and automate every cross-border tax filing.", "website": "https://paasa.com", "status": "Active", "batch": "Summer 2024", "stage": "Early", "team_size": 5, "subindustry": "Fintech -> Asset Management", "urgency": 6, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 6, "uniqueness": 6, "speed_to_market": 4, "upfront_investment": 3, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 59, "replicability": 4, "niche_category": "Wealth Management", "reasoning": "Wealthy Indians investing in global equities is a growing need driven by INR depreciation and international expenses. Removing middlemen and hidden fees is a clear value prop. However, regulatory complexity around Indian outward remittance limits (LRS) and competition from established brokers constrain growth."}, {"id": 30192, "name": "Axiom", "one_liner": "Trade memecoins, perpetuals, and earn yield.", "l t makes it easy for groups and communities to collect, fundraise, or pool money securely and effectively online. In addition to helping social organizers, the company is legally certified in securing fundraisers for non-profit organizations.", "website": "http://tilt.com", "status": "Acquired", "batch": "Winter 2012", "stage": "Early", "team_size": 51, "subindustry": "Fintech -> Consumer Finance", "urgency": 5, "market_size": 6, "pricing_potential": 4, "acquisition_cost": 5, "delivery_cost": 8, "uniqueness": 5, "speed_to_market": 7, "upfront_investment": 7, "upsell_potential": 5, "evergreen_potential": 6, "total_score": 58, "replicability": 7, "niche_category": "Consumer Finance", "reasoning": "Tilt enabled group money pooling and crowdfunding, a nice-to-have rather than urgent need. The concept is easily replicable and faces competition from Venmo, PayPal, and social payment apps. Acquired by Airbnb, suggesting the technology had value but the standalone business model was challenging."}, {"id": 374, "name": "TextPayMe", "one_liner": "", "long_description": "Founded in 2005, TextPayMe is an SMS payment service that lets you send money to other people using cell phone text messaging. TextPayMe lets you send money to anyone else in the US with an SMS-capable cell phone, and while phone carriers may charge for the actual text message sent/received, sending and receiving money is free while TextPayMe remains in Beta.\n\nIn July 2006, the TextPayMe team started working for Amazon and, as of 2011, the site redirects to an Amazon's mobile payment website. There was no press release related to this event but it's assumed the company was acquired.\n\nSending and receiving payments through TextPayMe is easy: simply write a text message to SMS@TextPayMe.com with \"pay amount phonenumber\" in the body (i.e. to send $5 to 123-456-7890, text \"pay 5 1234567890\"). The service is secure as well, as each payment needs to be confirmed by a user-created PIN. To fund your transactions, TextPayMe lets you add money directly from your bank account and now also lets you link your credit card as well. Currently, the maximum amount that can be sent or received per month is $500.", "website": "http://textpayme.com", "status": "Acquired", "batch": "Summer 2005", "stage": "Early", "team_size": 11, "subindustry": "Fintech -> Consumer Finance", "urgency": 6, "market_size": 7, "pricing_potential": 4, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 6, "speed_to_market": 7, "upfront_investment": 6, "upsell_potential": 5, "evergreen_potential": 5, "total_score": 58, "replicability": 6, "niche_category": "Payments", "reasoning": "TextPayMe was a pioneering SMS-based P2P payment service from 2005, well ahead of Venmo and Zelle. The SMS-based approach was innovative for its time but became obsolete as smartphones enabled app-based payments. Acquired early, validating the concept even though the specific technology approach was superseded."}, {"id": 503, "name": "Wefunder", "one_liner": "We're Robinhood for pre-IPO startups. Everyone can invest $100.", "long_description": "We help everyone invest in startups that they care about.\r\n\r\nWe believe that when all Americans can invest in innovation, the world will be a better place. And soon, our dream will become a reality. Thanks to the JOBS Act, everyone — not just the wealthy — can invest as little as $100 in the startups they care about. Not only does this open up the pool of investors, and increase the amount of great ideas that get funded, but it allows startups to grow an army of passionate investors who truly want to see them succeed. Second tier VC’s will become obsolete as startups tap their lead users and customers for quick early investments.", "website": "http://wefunder.com", "status": "Active", "batch": "Winter 2013", "stage": "Growth", "team_size": 35, "subindustry": "Fintech -> Asset Management", "urgency": 5, "market_size": 7, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 6, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 6, "evergreen_potential": 8, "total_score": 58, "replicability": 4, "niche_category": "Wealth Management", "reasoning": "Wefunder democratizes startup investing through equity crowdfunding enabled by the JOBS Act. The platform benefits from regulatory moat and community network effects. While the concept is replicable in theory, SEC registration and compliance requirements create real barriers, and the demand for alternative investments continues to grow."}, {"id": 611, "name": "Theorem", "one_liner": "The mission of Theorem is to make credit safe and available. We use…", "long_description": "Theorem conducts independent underwriting of consumer loans originated by banks, credit cards companies and other lenders. We utilize this information to manage institutional capital and securitize loans", "website": "http://theoremlp.com", "status": "Acquired", "batch": "Winter 2014", "stage": "Early", "team_size": 34, "subindustry": "Fintech -> Asset Management", "urgency": 7, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 4, "delivery_cost": 6, "uniqueness": 6, "speed_to_market": 3, "upfront_investment": 3, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 58, "replicability": 3, "niche_category": "Lending", "reasoning": "Theorem conducted independent underwriting of consumer loans and managed securitizations, serving institutional capital. This requires deep credit modeling expertise and regulatory compliance. The business model has strong pricing potential with institutional clients but requires significant capital and domain knowledge to replicate."}, {"id": 704, "name": "Apto Payments", "one_liner": "API platform for partners to issue branded debit and credit cards to…", "long_description": "Apto Payments provides a white-label, turnkey solution to launch innovative, user-first, card programs. Our technology empowers our customers to issue Visa and Maste lt risk in challenging markets."}, {"id": 12647, "name": "Rainbow", "one_liner": "Open-source, design centric software for interacting with blockchains", "long_description": "", "website": "https://rainbow.me", "status": "Active", "batch": "Summer 2019", "stage": "Early", "team_size": 28, "subindustry": "Fintech -> Consumer Finance", "urgency": 5, "market_size": 7, "pricing_potential": 4, "acquisition_cost": 5, "delivery_cost": 8, "uniqueness": 6, "speed_to_market": 5, "upfront_investment": 6, "upsell_potential": 6, "evergreen_potential": 6, "total_score": 58, "replicability": 5, "niche_category": "Crypto/Blockchain", "reasoning": "Rainbow is an open-source crypto wallet with strong design focus. The crypto wallet space is crowded but design differentiation matters for consumer adoption. Revenue generation is challenging for open-source wallet projects, and the market's longevity depends on broader crypto adoption."}, {"id": 12834, "name": "Flux", "one_liner": "Flux is building the payment network for alternative payments in…", "long_description": "Flux is building the payment network for alternative payments, with a focus on bringing acceptance of all BNPL options to on-site merchants so they can max their client's buying power.\r\n\r\nFlux provides an instant-issuing and payment acceptance solution for consumer credit products, and a payment terminal for alternative credit (non-card) for retailers.", "website": "http://paywithflux.com", "status": "Active", "batch": "Summer 2019", "stage": "Early", "team_size": 9, "subindustry": "Fintech -> Payments", "urgency": 6, "market_size": 7, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 6, "uniqueness": 6, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 7, "evergreen_potential": 7, "total_score": 58, "replicability": 4, "niche_category": "Payments", "reasoning": "Flux addresses the growing BNPL acceptance gap at physical merchants, a real pain point as BNPL expands beyond e-commerce. The g this a $325B potential market in assets under management. \r\n\r\nHowever, current investment apps in India are built for active investors. With over 16,000+ mutual funds and 5000+ stocks to choose from, they are far too complicated for beginners, who make up most of the market.\r\n\r\nWe’re building an AI - driven investment planning software that is designed for beginners. Users use our conversational AI to get diversified mutual fund portfolios tailored to their goals. We also offer users a credit card secured by their investments, so they can earn return without losing liquidity.\r\n\r\nIn terms of business model, we make commissions on the asset we manage, and interchange fees on the fund. We estimate we can make $12 per user per year, which is 6x our current acquisition cost of $2 per investor.", "website": "https://easyplan.in/", "status": "Inactive", "batch": "Winter 2020", "stage": "Early", "team_size": 8, "subindustry": "Fintech -> Asset Management", "urgency": 5, "market_size": 8, "pricing_potential": 4, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 5, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 7, "evergreen_potential": 7, "total_score": 58, "replicability": 5, "niche_category": "Wealth Management", "reasoning": "AI-driven investing for Indian beginners targets a massive market of new investors. The credit card secured by investments is a creative upsell. Now inactive despite 40K customers and strong growth, suggesting unit economics or competitive pressures were challenging."}, {"id": 22323, "name": "CapWay", "one_liner": "Inclusive financial technology service provider.", "long_description": "CapWay is a financial technology company that creates financial access and opportunity for all via our ecosystem, including digital banking tools, savings tools, financial content, and inclusion consumer fintech products. \r\n\r\nThe company fills financial gaps and provides solutions for the growing cashless economy and those who are looking to move away from the traditional financial system, including those who have been misunderstood, overlooked, and underserved.\r\n\r\nCapWay has a B2C and B2B2C customer acquisition strategy. \r\n\r\n", "website": "http://www.CapWay.com", "status": "Inactive", "batch": "Summer 2020", "stage": "Early", "team_size": 9, "subindustry": "Fintech -> Consumer Finance", "urgency": 6, "market_size": 7, "pricing_potential": 4, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 4, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 58, "replicability": 5, "niche_category": "Consumer Finance", "reasoning": "CapWay provides inclusive fintech services including digital banking and financial content for underserved communities. The financial inclusion mission is important but the neobank space is saturated. Now inactive, suggesting difficulty in differentiating. Pricing power is limited given the target demographic's sensitivity to fees."}, {"id": 22581, "name": "Atrato", "one_liner": "Enabling consumers split the cost of purchases without a credit card", "long_description": "Enabling merchants and consumers to offer flexibility at the point of sale\r\n", "website": "https://www.atratopago.com", "status": "Active", "batch": "Winter 2021", "stage": "Early", "team_size": 80, "subindustry": "Fintech -> Payments", "urgency": 7, "market_size": 8, "pricing_potential": 6, "acquisition_cost": 6, "delivery_cost": 5, "uniqueness": 4, "speed_to_market": 4, "upfront_investment": 3, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 58, "replicability": 3, "niche_category": "Consumer Finance", "reasoning": "Atrato is a BNPL platform for consumers without credit cards, focused on LatAm point-of-sale financing. BNPL is a proven high-demand model but requires significant capital for lending and faces increasing competition. The LatAm market has large potential given low credit card penetration, but credit risk management is critical."}, {"id": 22705, "name": "JoinSub", "one_liner": "India's first aggregator and provider of local business subscriptions", "long_description": "We, at JoinSub, are empowering the Indian small and medium retailers to drive repeat purchases & maximize their revenue by building a subscription-based model. \r\n\r\nIndia has over 14 million retail outlets, and we are poised to revolutionize the Retail Sector and enhance the buying experience both for retailers and consumers. We are dedicated to co-creating a community of futuristic retailers who are ready to embrace tech for growth.\r\n\r\nOur Subscription Programs work wonderfully for everyone who is looking to drive repurchases, right from those in the F&B industry, to Salons, Nail Salons, Spas, Gyms, Yoga & Dance Studios, Coffee Shops, Bakeries, Dry Cleaners, Florists, etc. We can help you delight your consumers and accelerate your business, the JoinSub Way!", "website": "https://joinsub.com", "status": "Inactive", "batch": "Winter 2021", "stage": "Early", "team_size": 8, "subindustry": "Fintech -> Payments", "urgency": 5, "market_size": 7, "pricing_potential": 4, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 6, "speed_to_market": 6, "upfront_investment": 5, "upsell_potential": 6, "evergreen_potential": 7, "total_score": 58, "replicability": 6, "niche_category": "Payments", "reasoning": "JoinSub builds subscription models for Indian local retailers to drive repeat purchases. The concept of subscription commerce for 14M Indian retail outlets is interesting but adoption among traditional retailers is uncertain. Now inactive, suggesting the market wasn't ready or the model had execution challenges."}, {"id": 23398, "name": "Prospa", "one_liner": "Banking for businesses ", "long_description": "", "website": "https://getprospa.com", "status": "Active", "batch": "Winter 2021", "stage": "Early", "team_size": 70, "subindustry": "Fintech -> Banking and Exchange", "urgency": 7, "market_size": 7, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 5, "uniqueness": 4, "speed_to_market": 4, "upfront_investment": 3, "upsell_potential": 8, "evergreen_potential": 9, "total_score": 58, "replicability": 3, "niche_category": "Banking", "reasoning": "Prospa is a business banking platform. Business banking is essential infrastructure with strong retention and upsell into lending, payments, and other services. Competition is fierce in the neobank space, requiring significant capital and regulatory compliance."}, {"id": 23974, "name": "Level", "one_liner": "Fast and simple fintech financing", "long_description": "Level provides fast and simple financing to lending startups that gets them off the ground and grows with them as they scale. We do so by buying loans in small quantities at first and rewarding our customers with more access to capital based on performance. Co-founder & CEO, Vladimir Korshin, previously worked in the traditional venture debt system at Silicon Valley Bank, where he noticed that strong startups were frequently denied from non-dilutive financing because they were too small. Just 4 weeks after going live with our first customer, we purchased $1.3M in loans across 6 customers. The founding team brings 30+ years of startup experience: Vladimir previously worked as an operator at Facebook, Eventbrite, and Niantic; Asa Schachar was an engineer at Microsoft and managed teams of engineers at Optimizely; Molly Hogan led new and international product initiatives at Amazon for over 7 years. Level is backed by Liquid2, Y Combinator (S21), and others. https://www.trylevel.app/", "website": "https://trylevel.app", "status": "Acquired", "batch": "Summer 2021", "stage": "Early", "team_size": 0, "subindustry": "Fintech -> Credit and Lending", "urgency": 8, "market_size": 7, "pricing_potential": 7, "acquisition_cost": 5, "delivery_cost": 4, "uniqueness": 6, "speed_to_market": 4, "upfront_investment": 2, "upsell_potential": 7, "evergreen_potentia ce platforms. \r\n\r\nBy combining banking and commerce data, Ruby provides businesses with a real-time, unified view of their financial health and money movement, empowering them to make better financial decisions and scale their operations.", "website": "https://www.spendruby.com", "status": "Active", "batch": "Winter 2023", "stage": "Early", "team_size": 3, "subindustry": "Fintech", "urgency": 6, "market_size": 7, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 6, "uniqueness": 5, "speed_to_market": 4, "upfront_investment": 4, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 58, "replicability": 4, "niche_category": "Banking", "reasoning": "Ruby Card combines banking with commerce platform integrations for e-commerce businesses, providing unified financial visibility. The e-commerce vertical focus differentiates from generic neobanks but the market is competitive. Integrating banking and commerce data is the key value prop but requires partnerships on both sides."}, {"id": 27936, "name": "ClickPe", "one_liner": "Finance on a Click", "long_description": "Small shop owners earn daily unlike salaried people but when it comes to loan repayment both are asked to pay monthly. For these shop owners it is difficult to calculate how much to save daily so that they will have the required installment amount at the end of the month and also at the time of repayment they have a big hole in their working capital.\r\n\r\nTherefore, when you earn daily why not pay daily and get away from the stress of huge one-time installments. \r\n\r\nEvery day a small amount of $X is deducted from your digital wallet which is on the auto-debit mandate and you don't need to worry about keeping your balance of $XXXX. You never default and also good credit scores are created.", "website": "https://clickpe.ai/", "status": "Active", "batch": "Winter 2023", "stage": "Early", "team_size": 2, "subindustry": "Fintech -> Credit and Lending", "urgency": 7, "market_size": 7 ential": 8, "total_score": 58, "replicability": 4, "niche_category": "Banking", "reasoning": "USD accounts for African freelancers and businesses protect against local currency volatility, a real and urgent need. The market is growing with remote work trends. However, competitors like Payoneer, Wise, and other Africa-focused neobanks create a crowded landscape."}, {"id": 29840, "name": "Blaze", "one_liner": "Global Venmo for cross border payments", "long_description": "Blaze (YC S24) is global Venmo for cross border payments. It's a peer to peer payments app that uses USDC to make payments fast and cheap between any two people anywhere in the world. The founders scaled their last startup to $1M in ARR, studied mathematics and engineering at Duke, NYU, and Cornell, and have led teams at Spotify, Artsy, and Bitpanda. They're live in the US and Mexico, available for download on iOS and Android: https://blaze.money", "website": "https://blaze.money", "status": "Active", "batch": "Summer 2024", "stage": "Early", "team_size": 5, "subindustry": "Fintech -> Payments", "urgency": 6, "market_size": 8, "pricing_potential": 4, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 5, "speed_to_market": 5, "upfront_investment": 5, "upsell_potential": 6, "evergreen_potential": 7, "total_score": 58, "replicability": 5, "niche_category": "Payments", "reasoning": "P2P cross-border payments using USDC is a large market but extremely competitive with Wise, Remitly, and other crypto-based solutions. The 'global Venmo' positioning is ambitious but requires massive user acquisition. Stablecoin rails provide cost advantages but regulatory uncertainty persists."}, {"id": 30051, "name": "attimet", "one_liner": "we predict stuff", "long_description": "We’re a research lab that puts its ideas to the test in one of the most complex, information-rich environments in the world: the financial markets.\r\n\r\nIf you care about learning systems, clean abstractions, and applying research in the wild - we’re hiring.", "website": "https://attimet.com/", "status": "Active", "batch": "Fall 2024", "stage": "Early", "team_size": 3, "subindustry": "Fintech", "urgency": 5, "market_size": 8, "pricing_potential": 8, "acquisition_cost": 8, "delivery_cost": 6, "uniqueness": 5, "speed_to_market": 3, "upfront_investment": 3, "upsell_potential": 5, "evergreen_potential": 7, "total_score": 58, "replicability": 3, "niche_category": "Wealth Management", "reasoning": "A research lab applying predictive models to financial markets is essentially a quant trading operation. The market is massive but extremely competitive with deep-pocketed incumbents like Renaissance, Two Sigma, and Citadel. No external customer acquisition needed but requires significant research talent and capital."}, {"id": 30798, "name": "Ruvo", "one_liner": "The Global Dollar App for Brazil", "long_description": "Ruvo is a global account for receiving, holding, and moving money between USD and BRL.\r\n\r\nWe connect Pix, crypto, and Visa so you can receive USD from abroad, convert between USD and BRL in minutes, send money to the U.S., spend worldwide, and save in digital dollars with yield — all in one place.\r\n\r\nRuvo supports both personal (CPF) and business (CNPJ) accounts, with low fees, strong security, and direct Pix settlement.\r\n\r\nFormerly known as Cacao.\r\n", "website": "https://ruvo.com/", "status": "Active", "batch": "Summer 2025", "stage": "Early", "team_size": 6, "subindustry": "Fintech", "urgency": 8, "market_size": 7, "pricing_potential": 5, "acquisition_cost": 6, "delivery_cost": 6, "uniqueness": 4, "speed_to_market": 4, "upfront_investment": 3, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 58, "replicability": 3, "niche_category": "Consumer Finance", "reasoning": "Ruvo is a USD/BRL global account for Brazilians, connecting Pix, crypto, and Visa. Brazil is a large market with real demand for USD access. Competition from similar dollar apps is growing, but Pix integrat ential": 8, "total_score": 57, "replicability": 4, "niche_category": "Banking", "reasoning": "Moneco targets African migrants in Europe with banking and free remittances, a well-defined underserved community. The diaspora banking niche has strong community-driven acquisition and high loyalty potential. Remittances provide a natural hook with strong expansion into broader financial services."}, {"id": 26770, "name": "Bridgecard", "one_liner": "Card issuer for Africa", "long_description": "Bridgecard makes it easy for fintechs to issue MasterCard or Visa cards that work anywhere in the world. We provide easy-to-integrate APIs to issue virtual and physical cards and we can get you started in weeks instead of months.\r\n\r\nFor nearly three years, we’ve supported Africa’s top startups with stable, high-growth card solutions. Thanks to our stability, over 50% of our clients have grown their volumes by more than 5X within 6 months. Our commitment is to deliver great cards that work, provide reliable support, and unbeatable uptime so that your users can be satisfied.", "website": "https://bridgecard.cards", "status": "Inactive", "batch": "Summer 2022", "stage": "Early", "team_size": 5, "subindustry": "Fintech -> Payments", "urgency": 7, "market_size": 6, "pricing_potential": 6, "acquisition_cost": 5, "delivery_cost": 7, "uniqueness": 5, "speed_to_market": 3, "upfront_investment": 3, "upsell_potential": 7, "evergreen_potential": 8, "total_score": 57, "replicability": 3, "niche_category": "Infrastructure/API", "reasoning": "Bridgecard provides card issuing APIs for African fintechs, enabling Visa and Mastercard issuance. Critical infrastructure for the growing African fintech ecosystem. The card network partnerships and regulatory requirements create barriers to entry but the company is now inactive."}, {"id": 27267, "name": "Ping", "one_liner": "The global neo-bank for contractors and freelancers", "long_description": "Ping enables international contractors and freelancers  India 60 days ago and have grown from 0 to 40k transacting users and hit a monthly GTV of $280K already. We are growing 25% week on week.\r\n\r\nIndia is a nation of savers but the way the majority of India saves is non-smart & does not create wealth. There are 200 Mn Indians who save manually in bank deposits, the returns from these instruments do not even beat India's inflation. \r\n\r\nGold is an instrument that India loves - 30Bn worth gold is purchased in India every year by middle income households. Gold has great cultural significance in India & there is high familiarity with the asset class. Despite gold being a familiar asset class & giving 5% higher returns than bank deposits, 200 Mn Indians still save manually in these non wealth creating bank deposits. This is largely because the ways to save in Gold required painful discrete activities such as manually accumulating money to buy gold, going to offline stores to buy this gold, incurring storage charges & more. The minimum ticket size for purchasing gold at these stores is $50 adding to more friction to saving in Gold.\r\n\r\nUsing automated savings, Gullak now makes it extremely easy for users to save small amounts regularly($1/day) in digital Gold.This was not possible a year ago because the underlying infrastructure(UPI Autopay) was missing. \r\n\r\nWith 50 Mn Indians saving $2/day & with gold backed lending, this is a $1.5Bn market opportunity.\r\n\r\nGullak’s Founding team is the team which built BHIM UPI App(10Mn Downloads in 10 Days), this was launched by the PM of India. We built large scale payment systems for partners like GooglePay / Amazon, processing more than 30Mn payments/day. This is the same team that has built more than 40+ consumer brands & their initial growth strategy.\r\n", "website": "https://gullak.money", "status": "Active", "batch": "Summer 2022", "stage": "Early", "team_size": 15, "subindustry": "Fintech", "urgency": 4, "market_size": 7, "pricing_potential": 4, "acquisition_cost": 7, "delivery_cost": 7, "uniqueness": 5, "speed_to_market": 5, "upfront_investment": 4, "upsell_potential": 6, "evergreen_potential": 7, "total_score": 56, "replicability": 5, "niche_category": "Consumer Finance", "reasoning": "Gullak automates savings into gold for Indian consumers, tapping into India's cultural affinity for gold. Strong early traction with 40K users in 60 days and 25% WoW growth. The automated micro-savings model is compelling but gold investment margins are thin and competition from PhonePe, Paytm is growing."}, {"id": 26797, "name": "Rio", "one_liner": "LATAM’s largest stablecoin FX and liquidity provider", "long_description": "Rio is the premier stablecoin liquidity provider for the LATAM market. We enable access to stablecoins for financial innovators to scale their products.", "website": "https://www.rio.trade", "status": "Active", "batch": "Summer 2022", "stage": "Early", "team_size": 10, "subindustry": "Fintech -> Payments", "urgency": 7, "market_size": 7, "pricing_potential": 6, "acquisition_cost": 4, "delivery_cost": 7, "uniqueness": 6, "speed_to_market": 3, "upfront_investment": 2, "upsell_potential": 7, "evergreen_potential": 7, "total_score": 56, "replicability": 3, "niche_category": "Crypto/Blockchain", "reasoning": "Rio is LatAm's largest stablecoin FX and liquidity provider, serving as critical infrastructure for stablecoin adoption in the region. The B2B infrastructure play for financial innovators is well-positioned as LatAm embraces stablecoins. Requires significant capital for liquidity provision but creates strong network effects."}, {"id": 27670, "name": "Finvest", "one_liner": "Easy way to buy US Treasury Bills", "long_description": "Purchase, manage, and sell US Treasury Bills seamlessly. Get direct access to government-backed treasury bills along with the flexibility of selling anytime.", "website": "https://www.getfinvest.com/", "status": "Active", "batch": "Winter 2023", "stage": "Early", "team_size": 5, "subindustry": ge rates or ATMs on your next trip. With Moreta, paying local merchants is easy, and the best part? Transparent fees.\r\n\r\nWe came up with Moreta while on our own backpacking adventures. Watching locals pay with a simple scan while we fumbled with cards and cash. So, we created a solution. By syncing with local payment networks, Moreta lets you pay like a local securely and digitally, without needing a bank account in every country.\r\n\r\nWe’re starting in Asia, where QR code digital wallets are taking over and are now the top choice at checkout. As these wallets start to join forces for cross-border payments, Moreta will be the first to bridge the gap for international travelers from card-centric markets to seamlessly tap into these local networks. Moreta will target 67 million travelers arriving in the region each year, who together have $127 billion in everyday expenditure.", "website": "https://moretapay.com", "status": "Active", "batch": "Summer 2024", "stage": "Early", "team_size": 3, "subindustry": "Fintech -> Payments", "urgency": 6, "market_size": 7, "pricing_potential": 5, "acquisition_cost": 5, "delivery_cost": 6, "uniqueness": 4, "speed_to_market": 5, "upfront_investment": 4, "upsell_potential": 6, "evergreen_potential": 8, "total_score": 56, "replicability": 5, "niche_category": "Payments", "reasoning": "Travel payments is a real pain point but well-served by Wise, Revolut, and credit cards with no foreign transaction fees. The transparent fee approach is good but not sufficiently differentiated. International travel is growing but the competitive landscape is tough."}, {"id": 30367, "name": "QFEX", "one_liner": "24/7 Global Stock Exchange", "long_description": "QFEX is the 24/7 exchange for traditional financial markets.\r\n\r\nWe let you trade US equities, commodities and FX pairs with (or without) leverages of up to 100x. On QFEX, UX comes first: brokerless market access, seamless integration with traditional payment rails, and ultra-efficient Per asses for people who have previously been locked out. Sellers can also sell a portion of their equity (starting at just 10%) instead of the entire property or create customized HELOC structures.\r\n\r\nInvestors can browse a variety of individual real estate properties ranging from commercial strip malls, a HELOC in someone's house, Airbnbs, to a single-family rental properties, and directly purchase ownership in these properties in under 5 minutes. There is no lockup period. Users can constantly trade these ownerships with others on the marketplace.\r\n\r\nInvestors truly legally own the properties they invested in and co-manage it with other investors through an online governance program. Owners have so far voted on how to handle various repairs, delinquent tenants, the sale of the underlying property, and much more.\r\n\r\nLofty never custodies or handles user funds or assets. Through smart-contracts on the blockchain, all transactions are directly peer-to-peer.\r\n\r\nIf we succeed, we'll have built the NASDAQ for real estate and transformed how real estate is bought and sold in the USA.", "website": "https://www.lofty.ai/", "status": "Active", "batch": "Summer 2019", "stage": "Early", "team_size": 7, "subindustry": "Fintech", "urgency": 4, "market_size": 8, "pricing_potential": 6, "acquisition_cost": 4, "delivery_cost": 6, "uniqueness": 7, "speed_to_market": 3, "upfront_investment": 3, "upsell_potential": 6, "evergreen_potential": 7, "total_score": 54, "replicability": 3, "niche_category": "Crypto/Blockchain", "reasoning": "Fractional real estate via blockchain is innovative but faces significant regulatory hurdles and investor education challenges. The real estate market is enormous but tokenization adoption is still nascent. Securities regulations and property management complexity make this hard to replicate but also hard to scale."}, {"id": 13207, "name": "Tienda Crypto", "one_liner": "Crypto Exchange and Payment API Gateway", "long_description": "Tienda Dó

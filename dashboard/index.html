const DIMS = ["urgency", "market_size", "pricing_potential", "acquisition_cost", "delivery_cost", "uniqueness", "speed_to_market", "upfront_investment", "upsell_potential", "evergreen_potential"];
const DIM_LABELS = ["Urgency", "Market Size", "Pricing Potential", "Acquisition Cost", "Delivery Cost", "Uniqueness", "Speed To Market", "Upfront Investment", "Upsell Potential", "Evergreen Potential"];
const NICHE_COLORS = {"Payments": "#4f46e5", "Banking": "#2563eb", "Lending": "#0891b2", "Insurance": "#059669", "Wealth Management": "#d97706", "Crypto/Blockchain": "#7c3aed", "Infrastructure/API": "#475569", "Accounting/Tax": "#ea580c", "Consumer Finance": "#db2777", "Embedded Finance": "#0d9488", "Regulatory/Compliance": "#dc2626", "Other": "#737373"};
const PER_PAGE = 50;
let filtered = [...DATA];
let currentPage = 1;
let sortField = 'total_score';
let sortDir = -1;
let detailChart = null;

function scoreBadge(s) {
  let cls = s >= 70 ? 'bg-emerald-100 text-emerald-800' : s >= 55 ? 'bg-blue-100 text-blue-800' : s >= 40 ? 'bg-amber-100 text-amber-800' : 'bg-red-100 text-red-800';
  return `<span class="${cls} px-2 py-0.5 rounded-full text-xs font-semibold">${s}</span>`;
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const niche = document.getElementById('nicheSelect').value;
  const status = document.getElementById('statusSelect').value;
  const minScore = parseInt(document.getElementById('minScore').value);
  document.getElementById('minScoreVal').textContent = minScore;
  filtered = DATA.filter(c =>
    (!q || c.name.toLowerCase().includes(q) || (c.one_liner||'').toLowerCase().includes(q)) &&
    (!niche || c.niche_category === niche) &&
    (!status || c.status === status) &&
    c.total_score >= minScore
  );
  doSort();
  currentPage = 1;
  render();
}

function doSort() {
  filtered.sort((a, b) => {
    let va = a[sortField] ?? '', vb = b[sortField] ?? '';
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    return va < vb ? -sortDir : va > vb ? sortDir : 0;
  });
}

function sortBy(field) {
  if (sortField === field) sortDir *= -1;
  else { sortField = field; sortDir = field === 'name' || field === 'niche_category' || field === 'status' || field === 'batch' ? 1 : -1; }
  document.querySelectorAll('[id^=sort-]').forEach(e => e.textContent = '');
  const el = document.getElementById('sort-' + field);
  if (el) el.textContent = sortDir === 1 ? '▲' : '▼';
  doSort();
  render();
}

function render() {
  const start = (currentPage - 1) * PER_PAGE;
  const page = filtered.slice(start, start + PER_PAGE);
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = page.map((c, i) => `
    <tr class="border-t border-gray-100 hover:bg-indigo-50/40 cursor-pointer transition" onclick="showDetail(${start + i})">
      <td class="px-4 py-3 font-medium text-gray-900 whitespace-nowrap">${c.name}</td>
      <td class="px-4 py-3 text-gray-600 max-w-xs truncate">${c.one_liner || ''}</td>
      <td class="px-4 py-3"><span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium" style="background:${NICHE_COLORS[c.niche_category] || '#737373'}20;color:${NICHE_COLORS[c.niche_category] || '#737373'}">${c.niche_category}</span></td>
      <td class="px-4 py-3">${scoreBadge(c.total_score)}</td>
      <td class="px-4 py-3 text-gray-700">${c.replicability}/10</td>
      <td class="px-4 py-3"><span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium ${c.status==='Active'?'bg-emerald-100 text-emerald-700':'bg-gray-100 text-gray-600'}">${c.status||''}</span></td>
      <td class="px-4 py-3 text-gray-500">${c.batch || ''}</td>
    </tr>
  `).join('');

  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  document.getElementById('pagination').innerHTML = `
    <span>Showing ${filtered.length ? start+1 : 0}-${Math.min(start+PER_PAGE, filtered.length)} of ${filtered.length} companies</span>
    <div class="flex gap-1">
      <button onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''} class="px-3 py-1 rounded border border-gray-300 hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed">Prev</button>
      <span class="px-3 py-1 text-gray-600">Page ${currentPage} / ${totalPages}</span>
      <button onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''} class="px-3 py-1 rounded border border-gray-300 hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed">Next</button>
    </div>
  `;
}

function goPage(p) { currentPage = p; render(); window.scrollTo(0, 300); }

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('nicheSelect').value = '';
  document.getElementById('statusSelect').value = '';
  document.getElementById('minScore').value = 0;
  applyFilters();
}

function showDetail(idx) {
  const c = filtered[idx];
  document.getElementById('detailName').textContent = c.name;
  document.getElementById('detailOneLiner').textContent = c.one_liner || '';
  document.getElementById('detailMeta').innerHTML = `
    ${scoreBadge(c.total_score)}
    <span class="px-2 py-0.5 rounded-full text-xs font-medium" style="background:${NICHE_COLORS[c.niche_category]||'#737373'}20;color:${NICHE_COLORS[c.niche_category]||'#737373'}">${c.niche_category}</span>
    <span class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full text-xs">Replicability: ${c.replicability}/10</span>
    <span class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full text-xs">${c.status}</span>
    ${c.batch ? `<span class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full text-xs">${c.batch}</span>` : ''}
  `;
  document.getElementById('detailDesc').textContent = c.long_description || '';
  document.getElementById('detailReasoning').innerHTML = '<strong class="text-gray-900">Analysis:</strong> ' + (c.reasoning || '');
  const link = document.getElementById('detailLink');
  if (c.website) { link.href = c.website; link.classList.remove('hidden'); }
  else { link.classList.add('hidden'); }

  if (detailChart) detailChart.destroy();
  const ctx = document.getElementById('detailRadar').getContext('2d');
  detailChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: DIM_LABELS,
      datasets: [{ label: c.name, data: DIMS.map(d => c[d]), backgroundColor: 'rgba(79,70,229,0.15)', borderColor: '#4f46e5', pointBackgroundColor: '#4f46e5', pointRadius: 3 }]
    },
    options: { scales: { r: { min: 0, max: 10, ticks: { stepSize: 2 } } }, plugins: { legend: { display: false } } }
  });
  document.getElementById('detailModal').classList.remove('hidden');
}

function closeDetail() { document.getElementById('detailModal').classList.add('hidden'); }

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('nicheSelect').addEventListener('change', applyFilters);
document.getElementById('statusSelect').addEventListener('change', applyFilters);
document.getElementById('minScore').addEventListener('input', applyFilters);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

// Initial
sortBy('total_score');
</script>
